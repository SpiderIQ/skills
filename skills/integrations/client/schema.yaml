# Integrations Skill — API Surface Definition
# Source of truth for Tier 3 client generation.
# Regenerate plugin with: opvs-skills generate integrations

name: integrations
version: "1.0.0"
description: >
  Manage API integrations for third-party services (SpiderIQ, Smartlead,
  SpiderMail, etc.) — create, update, delete keys, check health and spend.
category: integration
base_url: /api/v1
upstream:
  base_url: https://spideriq.ai/api/v1  # Option C direct (cut-over from base_url_env)
auth:
  type: pat
  header: Authorization
  prefix: Bearer
  env_var: OPVS_PAT
defaults:
  format: json
  timeout_ms: 30000
requires_brand: true
triggers:
  - integrations
  - api key
  - credentials
  - connect
  - provider
  - subscription key
  - billing mode
  - subscription package

guidance:
  use: >
    Manage a brand's third-party API integration keys — create/update/delete
    provider keys, check health + spend, and set a key's billing treatment
    (auto | subscription | paid) plus its subscription package (tier). Use
    listSubscriptionTiers to discover valid package keys before marking a key
    as a subscription.
  intent_aliases: []   # no method takes a free-text search field (every selector is a typed id/name)
  pitfalls:
    - "Marking a key billing_mode='subscription' force-de-pools it — a subscription key is private to the brand and never joins the shared litellm pool (share_with_pool is rejected for subscription/paid keys)."
    - "subscription_tier takes a tier_key from listSubscriptionTiers (e.g. minimax_max), NOT the human label — it seeds the key's metering window (the subscription meter's denominator)."
    - "billing_mode='auto' (the default) defers to the provider's own cost_type; only override to 'subscription'/'paid' when you deliberately want a flat-fee coding plan or forced per-token billing."

methods:
  # -- Overview (aggregated provider stats) ----------------------------------
  getOverview:
    description: >
      Get an aggregated overview of all configured providers for the brand.
      Returns per-provider key counts, active/healthy counts, daily capacity
      and spend totals.
    http: GET /brands/{brand_id}/integrations
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
    response:
      format: json

  # -- Provider Templates ----------------------------------------------------
  listProviders:
    description: >
      List available provider templates with their required credential
      fields and default limits.
    http: GET /brands/{brand_id}/integrations/providers
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
    response:
      format: json

  # -- Subscription-Package Catalog ------------------------------------------
  listSubscriptionTiers:
    description: >
      List the curated subscription-package catalog (provider_subscription_tiers)
      an agent chooses a subscription_tier from BEFORE marking a key
      billing_mode=subscription. Each row: provider_name, tier_key (the value you
      pass as subscription_tier), label, price_usd_month, window_hours,
      window_limit, weekly_cap, sort_order. Optionally filter to one provider.
    guidance:
      use: "Discover valid subscription_tier values (with their metering windows + prices) before setting one on a key."
      next: "createIntegration / updateIntegration (set billing_mode=subscription + the chosen tier_key)"
      warn: "Pass tier_key — NOT label — as subscription_tier. An empty list means no packages are curated for that provider yet."
      telemetry_signal_default: warm
    http: GET /brands/{brand_id}/gate/subscription-tiers
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      provider:
        type: string
        required: false
        description: Filter to one provider's packages (e.g. minimax)
    response:
      format: json

  # -- List All Keys ---------------------------------------------------------
  listIntegrations:
    description: >
      List all integration keys for the brand, optionally filtered by
      provider name. Returns key previews, health status, usage counters
      and spend data.
    http: GET /brands/{brand_id}/integrations/all
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      provider_name:
        type: string
        required: false
        description: Filter by provider name (e.g. spideriq, smartlead)
    response:
      format: json

  # -- Single Integration Detail ---------------------------------------------
  getIntegration:
    description: >
      Get details for a single integration key including preview, health
      status, usage and spend limits.
    http: GET /brands/{brand_id}/integrations/{integration_id}
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      integration_id:
        type: integer
        required: true
        description: The integration key ID
    response:
      format: json

  # -- Create Integration ----------------------------------------------------
  createIntegration:
    description: >
      Create a new API integration key. Requires provider_name and a
      credentials object with the provider's required fields. Brand
      admin only. Optionally set the key's billing treatment
      (billing_mode) + subscription package (subscription_tier).
    guidance:
      use: "Add a provider key. Pass billing_mode=subscription + subscription_tier to register it as a flat-fee subscription plan."
      next: "listSubscriptionTiers (pick a tier_key first), getIntegration (verify health)"
      warn: "A subscription/paid key is force-de-pooled — do not also set share_with_pool. subscription_tier is a tier_key from listSubscriptionTiers, not a label."
      telemetry_signal_default: cold
    http: POST /brands/{brand_id}/integrations
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      provider_name:
        type: string
        required: true
        description: Provider identifier (e.g. spideriq, smartlead, spidermail)
      credentials:
        type: object
        required: true
        description: Provider-specific credential fields (api_key, workspace, etc.)
      key_label:
        type: string
        required: false
        description: Human-readable label for this key
      is_primary:
        type: boolean
        required: false
        default: false
        description: Set as primary key for this provider
      daily_limit:
        type: integer
        required: false
        description: Daily usage limit (overrides provider default)
      minute_limit:
        type: integer
        required: false
        description: Per-minute usage limit (overrides provider default)
      country_code:
        type: string
        required: false
        description: Country code for region-specific keys
      billing_mode:
        type: string
        required: false
        values: ["auto", "subscription", "paid"]
        description: >
          Owner billing override (default auto). auto = defer to the provider's
          own cost_type; subscription = treat a metered-looking provider's key as
          a flat-fee coding plan (e.g. MiniMax / Z.ai / Qwen) — this force-de-pools
          the key (a subscription key is private, never shared to the pool); paid =
          force per-token / metered billing.
      subscription_tier:
        type: string
        required: false
        description: >
          Package/plan key (e.g. minimax_max) naming the subscription tier — a soft
          reference to the curated provider_subscription_tiers catalog (discover
          valid values via listSubscriptionTiers). When set, seeds the key's
          metering window (sub_window_hours / sub_window_limit) so the subscription
          meter has a denominator. Only meaningful with billing_mode=subscription.
    response:
      format: json

  # -- Update Integration ----------------------------------------------------
  updateIntegration:
    description: >
      Update an existing integration key. Supports partial updates for
      label, credentials, limits, priority, active status, spend
      limits, and billing treatment (billing_mode / subscription_tier).
      Brand admin only.
    guidance:
      use: "Edit a key's label / limits / status, or change its billing treatment (mark it subscription + pick a package)."
      next: "listSubscriptionTiers (to pick a valid tier_key), getIntegration (verify)"
      warn: "Setting billing_mode='subscription' force-de-pools the key. Omitted fields are unchanged (partial PATCH); subscription_tier is a tier_key, not a label."
      telemetry_signal_default: warm
    http: PATCH /brands/{brand_id}/integrations/{integration_id}
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      integration_id:
        type: integer
        required: true
        description: The integration key ID to update
      key_label:
        type: string
        required: false
        description: Updated human-readable label
      credentials:
        type: object
        required: false
        description: Updated credential fields (merged with existing)
      is_active:
        type: boolean
        required: false
        description: Enable or disable the key
      is_primary:
        type: boolean
        required: false
        description: Set as primary key for this provider
      daily_limit:
        type: integer
        required: false
        description: Updated daily usage limit
      minute_limit:
        type: integer
        required: false
        description: Updated per-minute usage limit
      priority:
        type: integer
        required: false
        description: Round-robin priority (higher = preferred)
      spend_limit_amount:
        type: number
        required: false
        description: Spend limit amount
      spend_limit_period:
        type: string
        required: false
        description: Spend limit period (daily, monthly)
      spend_limit_action:
        type: string
        required: false
        description: Action when limit hit (pause, alert)
      billing_mode:
        type: string
        required: false
        values: ["auto", "subscription", "paid"]
        description: >
          Owner billing override: auto | subscription | paid. None/omit = no-change.
          subscription force-de-pools the key (a subscription key is private and
          never joins the shared pool); paid forces per-token billing; auto defers
          to the provider's own cost_type.
      subscription_tier:
        type: string
        required: false
        description: >
          Package/plan key (tier_key from listSubscriptionTiers, e.g. minimax_max) —
          soft ref to provider_subscription_tiers. Setting it re-seeds the key's
          metering window. None/omit = no-change on PATCH.
    response:
      format: json

  # -- Delete Integration ----------------------------------------------------
  deleteIntegration:
    description: >
      Delete an integration key permanently. Also deregisters associated
      services (e.g. SpiderMail mailboxes). Brand admin only.
    http: DELETE /brands/{brand_id}/integrations/{integration_id}
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      integration_id:
        type: integer
        required: true
        description: The integration key ID to delete
    response:
      format: json

  # -- Reset Usage Counters --------------------------------------------------
  resetUsage:
    description: >
      Reset daily and minute usage counters for an integration key.
      Brand admin only.
    http: POST /brands/{brand_id}/integrations/{integration_id}/reset-usage
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      integration_id:
        type: integer
        required: true
        description: The integration key ID
    response:
      format: json

  # -- Spend Detail ----------------------------------------------------------
  getSpend:
    description: >
      Get spend details for a single integration key including cached
      balance, daily and monthly usage, and currency.
    http: GET /brands/{brand_id}/integrations/{integration_id}/spend
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      integration_id:
        type: integer
        required: true
        description: The integration key ID
    response:
      format: json

  # -- Provider Spend Overview -----------------------------------------------
  getProviderSpend:
    description: >
      Get aggregated spend overview for all keys of a specific provider.
      Includes per-key snapshots with balance, daily/monthly usage.
    http: GET /brands/{brand_id}/integrations/spend/provider/{provider_name}
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      provider_name:
        type: string
        required: true
        description: Provider name (e.g. spideriq, smartlead)
    response:
      format: json

  # -- Sync Billing ----------------------------------------------------------
  syncBilling:
    description: >
      Trigger a billing sync for an integration key. Fetches current
      balance and usage from the provider API. Brand admin only.
    http: POST /brands/{brand_id}/integrations/{integration_id}/sync-billing
    params:
      brand_id:
        type: integer
        required: true
        description: Brand ID
      integration_id:
        type: integer
        required: true
        description: The integration key ID
    response:
      format: json
