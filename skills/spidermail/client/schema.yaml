# Send/Receive Email Skill — API surface + envelope contract (Initiative A)
# ONE skill for the SpiderMail agent surface: real mailboxes (Zoho / Google
# Workspace / Outlook) read + written by an agent over a PAT. Read is a direct
# DB query; send/reply/forward is an async job through the SpiderMail worker
# queue. Templates (Jinja2) render on the server; attachments are extracted by
# the poller and ride inline on the message read.
#
# Source of truth for Tier-3 marketplace client generation. Every method below
# maps to a route VERIFIED served in app/api/v1/mail.py, mail_templates.py,
# mail_views.py, mail_outreach.py, or jobs/spidermail.py (2026-06-11). No phantom
# endpoints. Outreach methods are brand-scoped (/brands/{id}/mail/outreach/*) —
# reads PAT-ok, writes brand-admin (require_brand_admin_or_super).
#
# Auth: SPIDERIQ_PAT (Bearer client_id:api_key:api_secret) per the SpiderCLI
# convention. base_url is /api/v1; every method path carries its own /mail/* (or
# /jobs/*) segment, so the full URL is e.g. https://spideriq.ai/api/v1/mail/inbox.

name: spidermail
version: "0.4.0"
description: >
  Agent-driven email over SpiderMail — read a mailbox (inbox, single message,
  conversation thread, full-text search, one-call session bootstrap), send/reply/
  forward through a registered mailbox, render and manage Jinja2 templates, mark
  messages read/starred/labelled, and review the security quarantine. Inbound
  HTML is delivered as clean structured data (~37x fewer tokens); outbound bodies
  are written in markdown and auto-converted to professional HTML. Per-tenant,
  PAT-scoped. Agent-friendly ?format=yaml|md on every read.
category: communication
base_url: /api/v1
auth:
  type: pat
  header: Authorization
  prefix: Bearer
  env_var: SPIDERIQ_PAT
defaults:
  format: json
  timeout_ms: 30000
requires_brand: true
triggers:
  - email
  - inbox
  - send email
  - reply
  - forward
  - compose
  - mail
  - mailbox
  - check my email
  - read my email
  - search email
  - email thread
  - email template
  - mark as read

guidance:
  use: >
    Handle email on a brand's behalf — read a real mailbox (inbox / message /
    thread / search / session), send/reply/forward, render+manage templates, and
    keep the inbox tidy (read/star/labels). Inbound arrives as clean data, outbound
    is written in markdown.
  not:
    - "spiderflows / lead-search -> FIND prospects and emails to contact (this sends to addresses you already have)"
    - "spiderVerify -> validate that an address is deliverable BEFORE sending (this does not verify recipients)"
    - "the SpiderPublish content tools -> publish a web page or a marketing site (this is 1:1 email, not web content)"
  intent_aliases: ["q", "query", "search_query"]   # Q1 — searchMail takes textual search
  pitfalls:
    - "A send is ASYNC: POST returns a job_id (queued), NOT a delivered email. Poll the job to confirm — a queued job can still fail at SMTP."
    - "Email is irreversible — there is no unsend. Confirm the real recipient with the user before any non-test send."
    - "reply/forward need the numeric reply_to_message_id (the message `id`), NOT the RFC Message-ID header string."
    - "Outbound bodies containing secrets (API keys, passwords, private keys) are BLOCKED by the credential scanner before SMTP — never put a token in body_text."
    - "Attachment text rides inline on getMessage (?include_attachments) as a preview; there is no separate attachment-fetch endpoint (see references/gaps.md)."

methods:
  # ── Read: inbox, message, thread, search, session ─────────────
  getInbox:
    description: >
      List inbox messages. With no `email` this is the Master Inbox (every
      message across all the tenant's mailboxes, newest first); pass `email` to
      scope to one mailbox, or `view_id` to apply a saved view's filter. Filter
      by `folder` and `unread_only`; paginate with `limit`/`offset`.
    guidance:
      use: "browse what just arrived — the master inbox, one mailbox, or a saved view"
      next: "getMessage to open one (marks it read); getThread to see the whole conversation"
      warn: "no `email` = ALL mailboxes (master inbox). Reading a message via getMessage marks it read; getInbox does not."
      telemetry_signal_default: "hot"
    http: GET /mail/inbox
    params:
      email:       { type: string,  required: false, description: 'Scope to one mailbox address. Omit for the client-wide Master Inbox.' }
      view_id:     { type: integer, required: false, description: 'Apply a saved view (/mail/views) filter_config by id' }
      unread_only: { type: boolean, required: false, description: 'Only unread messages' }
      folder:      { type: string,  required: false, description: 'INBOX (default) | Sent | Drafts | Trash' }
      limit:       { type: integer, required: false, description: 'Page size (default 20, max 100)' }
      offset:      { type: integer, required: false, description: 'Pagination offset (default 0)' }
      format:      { type: string,  required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  getSession:
    description: >
      One-call agent bootstrap for a mailbox: its info, unread count, and the
      most recent messages in a single response. Optimised for an agent that
      needs to understand mailbox state fast. Use ?format=yaml for ~60% fewer tokens.
    guidance:
      use: "FIRST call when starting work on a mailbox — state + recent messages in one round-trip"
      next: "getMessage to open one; sendEmail to act"
      warn: "`email` is required (this is per-mailbox, not master-inbox). 404 if that address is not a registered mailbox of yours."
      telemetry_signal_default: "hot"
    http: GET /mail/session
    params:
      email:          { type: string,  required: true,  description: 'Mailbox email address' }
      include_recent: { type: integer, required: false, description: 'Number of recent messages to include (0-50, default 10)' }
      format:         { type: string,  required: false, description: 'json (default) | yaml' }
    response: { format: json }

  getMessage:
    description: >
      Read one message by its numeric id, including the full clean body and
      headers. Reading MARKS THE MESSAGE READ. With include_attachments (default
      true) the response carries each attachment's filename, type, size, and an
      extracted-text preview inline.
    guidance:
      use: "open a single message to read its full body + attachment previews"
      next: "sendEmail action=reply with reply_to_message_id=<this id>; updateMessage to (un)star/label"
      warn: "side effect: this marks the message read. `message_id` is the numeric DB id from a list/search row, not the RFC Message-ID header."
      telemetry_signal_default: "warm"
    http: GET /mail/messages/{message_id}
    params:
      message_id:          { type: string,  required: true,  description: 'Numeric message id (the `id` from getInbox/searchMail)' }
      include_attachments: { type: boolean, required: false, description: 'Include attachment summaries + text previews (default true)' }
      format:              { type: string,  required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  getThread:
    description: >
      Get an entire conversation thread by thread_id — every inbound and
      outbound message in the thread, in order. The thread_id is on each message
      row; it is computed from the RFC References/In-Reply-To chain.
    guidance:
      use: "see the whole back-and-forth before replying, so you keep context"
      next: "sendEmail action=reply with reply_to_message_id = the latest message's id in the thread"
      warn: "thread_id is the computed thread root id (a message field), not a message id and not a subject."
      telemetry_signal_default: "warm"
    http: GET /mail/threads/{thread_id}
    params:
      thread_id: { type: string, required: true,  description: 'Thread id (the `thread_id` field on any message in the thread)' }
      format:    { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  searchMail:
    description: >
      Full-text search a mailbox (subject + body) plus structured filters by
      sender, subject substring, and date range. `q` is the FTS query;
      from_addr/subject are ILIKE substring filters; since/before bound the date.
    guidance:
      use: "find a past email by words in it, by who sent it, or within a date range"
      next: "getMessage to open a hit; getThread for its full conversation"
      warn: "`email` (the mailbox to search) is REQUIRED. `q` is the search text — intent_aliases q/query/search_query map here."
      telemetry_signal_default: "warm"
    http: GET /mail/search
    params:
      email:     { type: string, required: true,  description: 'Mailbox email address to search (required)' }
      q:         { type: string, required: false, description: 'Full-text query over subject + body' }
      from_addr: { type: string, required: false, description: 'Filter by sender address (substring, ILIKE)' }
      subject:   { type: string, required: false, description: 'Filter by subject (substring, ILIKE)' }
      since:     { type: string, required: false, description: 'Only messages on/after this ISO-8601 date' }
      before:    { type: string, required: false, description: 'Only messages before this ISO-8601 date' }
      limit:     { type: integer, required: false, description: 'Max results (default 20)' }
      format:    { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  # ── Mailboxes ─────────────────────────────────────────────────
  listMailboxes:
    description: >
      List the tenant's registered mailboxes with per-mailbox unread counts.
    guidance:
      use: "see which mailboxes you can send-from / read"
      next: "getSession <email> to bootstrap one; getInbox for the master view"
      warn: "the `from_email` you send with MUST be one of these registered addresses."
      telemetry_signal_default: "warm"
    http: GET /mail/mailboxes
    params:
      format: { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  getMailboxStats:
    description: >
      Per-mailbox aggregates (total / unread / starred counts) plus client-wide
      totals — the data behind the Master Inbox sidebar.
    guidance:
      use: "get unread/starred counts per mailbox without listing messages"
      telemetry_signal_default: "warm"
    http: GET /mail/mailboxes/stats
    params:
      format: { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  createMailbox:
    description: >
      Register/connect an external mailbox by its IMAP + SMTP credentials.
      Passwords are Fernet-encrypted at rest. The poller begins ingesting on the
      next cycle.
    guidance:
      use: "connect a Zoho / Google Workspace / Outlook mailbox so the agent can read + send from it"
      next: "testMailbox to confirm connectivity before relying on it"
      warn: "needs BOTH imap_* and smtp_* creds (use an app-specific password where the provider requires one). Wrong port/TLS fails silently — 465=SSL, 587=STARTTLS."
      telemetry_signal_default: "cold"
    http: POST /mail/mailboxes
    params:
      email_address: { type: string,  required: true,  description: 'Mailbox email address' }
      provider:      { type: string,  required: true,  description: 'zoho | google_workspace | outlook' }
      imap_host:     { type: string,  required: true,  description: 'IMAP server hostname' }
      imap_username: { type: string,  required: true,  description: 'IMAP login username' }
      imap_password: { type: string,  required: true,  description: 'IMAP password / app password (encrypted at rest)' }
      smtp_host:     { type: string,  required: true,  description: 'SMTP server hostname' }
      smtp_username: { type: string,  required: true,  description: 'SMTP login username' }
      smtp_password: { type: string,  required: true,  description: 'SMTP password / app password (encrypted at rest)' }
      display_name:  { type: string,  required: false, description: 'Sender display name' }
      imap_port:     { type: integer, required: false, description: 'IMAP port (default 993)' }
      smtp_port:     { type: integer, required: false, description: 'SMTP port (default 587)' }
    response: { format: json }

  testMailbox:
    description: Test a mailbox's IMAP + SMTP connectivity without sending anything.
    guidance:
      use: "verify a freshly connected mailbox before sending through it"
      warn: "a failure here is almost always a wrong port/TLS or a non-app-password. 465=implicit SSL, 587=STARTTLS."
      telemetry_signal_default: "cold"
    http: POST /mail/mailboxes/{email}/test
    params:
      email: { type: string, required: true, description: 'Mailbox email address to test' }
    response: { format: json }

  deleteMailbox:
    description: Remove a mailbox connection and all of its stored messages.
    guidance:
      use: "disconnect a mailbox you no longer manage"
      warn: "DESTRUCTIVE — deletes the mailbox AND every stored message for it. Confirm with the user first; there is no undo."
      telemetry_signal_default: "cold"
    http: DELETE /mail/mailboxes/{email}
    params:
      email: { type: string, required: true, description: 'Mailbox email address to remove' }
    response: { format: json }

  # ── Send / reply / forward (async via the worker queue) ───────
  sendEmail:
    description: >
      Send a new email, reply to an existing one, or forward one — through a
      registered mailbox, via the SpiderMail worker queue. Write `body_text` in
      markdown; it is auto-converted to professional HTML (pass body_html only to
      override). Returns a job_id (QUEUED) — poll the job to confirm delivery.
    guidance:
      use: "deliver email: action=send (new), reply (responds + auto-threads), forward (passes along)"
      next: "get_job_status with the returned job_id — a 201 means QUEUED, not delivered"
      warn: "IRREVERSIBLE + ASYNC. Confirm the recipient with the user first. reply/forward need the numeric reply_to_message_id. Set test=true to route to the test queue while developing."
      telemetry_signal_default: "cold"
    http: POST /jobs/spiderMail/submit
    params:
      payload:
        type: object
        required: true
        description: The email job payload
        properties:
          action:              { type: string,  required: true,  description: 'send | reply | forward (default send)' }
          from_email:          { type: string,  required: true,  description: 'Sender — MUST be a registered mailbox address' }
          to:                  { type: array,   items: string, required: false, description: 'Recipients (required for send/forward)' }
          cc:                  { type: array,   items: string, required: false, description: 'CC recipients' }
          subject:             { type: string,  required: false, description: 'Subject (required for send; inherited on reply/forward)' }
          body_text:           { type: string,  required: true,  description: 'Body in markdown (auto-converted to HTML)' }
          body_html:           { type: string,  required: false, description: 'Explicit HTML body (override; usually leave unset)' }
          template_name:       { type: string,  required: false, description: 'Apply a saved template by name (Jinja2)' }
          template_data:       { type: object,  required: false, description: 'Variable values for the template' }
          reply_to_message_id: { type: integer, required: false, description: 'Numeric message id to reply to / forward (required for reply/forward)' }
          reply_all:           { type: boolean, required: false, description: 'Reply to all recipients (reply action only)' }
          test:                { type: boolean, required: false, description: 'Route to the test queue instead of sending (default false)' }
    response: { format: json }

  # ── Message state: read / star / labels ──────────────────────
  updateMessage:
    description: >
      Update a message's flags — mark read/unread, star/unstar, set labels, or
      attach a private note. Only the fields you pass change.
    guidance:
      use: "keep the inbox tidy — mark read, star a hot lead, tag with labels"
      next: "getInbox unread_only=true to see what remains"
      warn: "labels REPLACES the label set (it is not additive) — send the full intended list. message_id is the numeric id."
      telemetry_signal_default: "warm"
    http: PATCH /mail/messages/{message_id}
    params:
      message_id: { type: string,  required: true,  description: 'Numeric message id' }
      is_read:    { type: boolean, required: false, description: 'Mark read (true) / unread (false)' }
      is_starred: { type: boolean, required: false, description: 'Star / unstar' }
      labels:     { type: array,   items: string, required: false, description: 'Replace the message label set with this list' }
      notes:      { type: string,  required: false, description: 'Private per-message note (not sent to anyone)' }
    response: { format: json }

  # ── Templates (Jinja2, server-rendered) ──────────────────────
  listTemplates:
    description: List the tenant's email templates (signature / header / layout / full).
    guidance:
      use: "see reusable templates before composing"
      next: "previewTemplate to render one with variables; sendEmail template_name=<name>"
      telemetry_signal_default: "warm"
    http: GET /mail/templates
    params:
      format: { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  getTemplate:
    description: Get one template's full source (html_source + detected variables) by id.
    guidance:
      use: "inspect a template's Jinja2 source and variable list"
      warn: "template_id is the integer id from listTemplates."
      telemetry_signal_default: "warm"
    http: GET /mail/templates/{template_id}
    params:
      template_id: { type: string, required: true,  description: 'Integer template id' }
      format:      { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  createTemplate:
    description: >
      Create a reusable Jinja2 email template. template_type controls how it is
      applied: signature (appended), header (prepended), layout (wraps the body
      via a {{ body }} slot), or full (the whole email). Variables are auto-detected
      from {{ ... }} if not supplied.
    guidance:
      use: "save a branded signature / layout / full template for repeated sends"
      next: "previewTemplate to render it; sendEmail template_name=<name>"
      warn: "name must be unique per client and is lowercased (letters/numbers/-/_ only). Rendering is sandboxed Jinja2 — no arbitrary code."
      telemetry_signal_default: "cold"
    http: POST /mail/templates
    params:
      name:          { type: string,  required: true,  description: 'Unique template name ([a-z0-9-_], lowercased)' }
      html_source:   { type: string,  required: true,  description: 'Jinja2 HTML source' }
      template_type: { type: string,  required: false, description: 'signature | header | layout | full (default full)' }
      description:   { type: string,  required: false, description: 'Human description' }
      text_source:   { type: string,  required: false, description: 'Optional plain-text variant' }
      variables:     { type: array,   items: string, required: false, description: 'Variable names (auto-detected if omitted)' }
      is_default:    { type: boolean, required: false, description: 'Set as the default for this template_type' }
    response: { format: json }

  updateTemplate:
    description: Update an existing template (any subset of its fields).
    guidance:
      use: "edit a template's source, type, or default flag"
      warn: "uses PUT — send the fields you want to change. template_id is the integer id."
      telemetry_signal_default: "cold"
    http: PUT /mail/templates/{template_id}
    params:
      template_id:   { type: string,  required: true,  description: 'Integer template id' }
      name:          { type: string,  required: false, description: 'New unique name' }
      html_source:   { type: string,  required: false, description: 'New Jinja2 HTML source' }
      template_type: { type: string,  required: false, description: 'signature | header | layout | full' }
      description:   { type: string,  required: false, description: 'New description' }
      text_source:   { type: string,  required: false, description: 'New plain-text variant' }
      variables:     { type: array,   items: string, required: false, description: 'New variable list' }
      is_active:     { type: boolean, required: false, description: 'Enable / disable' }
      is_default:    { type: boolean, required: false, description: 'Set as default for its type' }
    response: { format: json }

  deleteTemplate:
    description: Delete a template by id.
    guidance:
      use: "remove a template no longer in use"
      warn: "a mailbox that set this as its default_template_id falls back to no template."
      telemetry_signal_default: "cold"
    http: DELETE /mail/templates/{template_id}
    params:
      template_id: { type: string, required: true, description: 'Integer template id' }
    response: { format: json }

  previewTemplate:
    description: >
      Render a template with sample variable values and return the resulting HTML
      WITHOUT sending anything. The safe way to check a template before a real send.
    guidance:
      use: "render a template with real values to eyeball the output before sending"
      next: "sendEmail template_name=<name> template_data=<same variables> once it looks right"
      warn: "variables is the variable map (the legacy alias is template_data — both accepted). Missing variables render empty, they do not error."
      telemetry_signal_default: "warm"
    http: POST /mail/templates/{template_id}/preview
    params:
      template_id: { type: string, required: true,  description: 'Integer template id' }
      variables:   { type: object, required: false, description: 'Variable values for the render (alias: template_data)' }
    response: { format: json }

  # ── AI compose assist ─────────────────────────────────────────
  composeAssist:
    description: >
      AI writing assistant for email. action=write generates a new draft from
      subject/context; rewrite/expand/shorten/formal/casual/fix_grammar transform
      the text in `context`. Returns suggested text — it does NOT send.
    guidance:
      use: "draft or improve email copy before sending — write new, or transform a draft"
      next: "sendEmail with the returned text once the user approves it"
      warn: "this only DRAFTS — nothing is sent. For action=write, context is the brief; for transforms, context is the text to change."
      telemetry_signal_default: "warm"
    http: POST /mail/compose/assist
    params:
      action:         { type: string, required: true,  description: 'write | rewrite | expand | shorten | formal | casual | fix_grammar' }
      context:        { type: string, required: false, description: 'The brief (for write) or the text to transform' }
      subject:        { type: string, required: false, description: 'Subject, for context' }
      tone:           { type: string, required: false, description: 'professional (default) | friendly | casual | formal' }
      thread_context: { type: string, required: false, description: 'Prior thread messages for context' }
    response: { format: json }

  # ── Security: quarantine review ───────────────────────────────
  listSecurityEvents:
    description: >
      List security events for the tenant's mailboxes — inbound prompt-injection
      detections, outbound credential blocks, quarantines, releases.
    guidance:
      use: "audit what the inbound scanner / outbound credential blocker flagged"
      next: "listQuarantine to see held messages; releaseMessage to release a false positive"
      telemetry_signal_default: "cold"
    http: GET /mail/security/events
    params:
      limit:  { type: integer, required: false, description: 'Max events (default 50)' }
      format: { type: string,  required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  listQuarantine:
    description: List messages auto-quarantined by the inbound prompt-injection scanner.
    guidance:
      use: "review messages held back from the inbox as suspicious"
      next: "releaseMessage to release one you judge safe"
      warn: "quarantined messages are deliberately kept out of getInbox — this is the only way to see them."
      telemetry_signal_default: "cold"
    http: GET /mail/quarantine
    params:
      format: { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  releaseMessage:
    description: Release a quarantined message back into the normal inbox.
    guidance:
      use: "clear a false-positive quarantine so the message is readable again"
      warn: "only release after a human judges the content safe — quarantine exists to stop prompt-injection reaching the agent."
      telemetry_signal_default: "cold"
    http: POST /mail/messages/{message_id}/release
    params:
      message_id: { type: string, required: true, description: 'Numeric id of the quarantined message' }
    response: { format: json }

  # ── Organise the inbox: folders, bulk, snooze, labels, views ──
  listFolders:
    description: List a mailbox's folders (INBOX / Sent / Drafts / Trash …) with per-folder totals + unread counts. `email` is required.
    guidance:
      use: "see one mailbox's folder structure + counts before scoping getInbox to a folder"
      warn: "`email` is REQUIRED (this is per-mailbox; there is no client-wide folder list). Omitting it is a 422."
      telemetry_signal_default: "warm"
    http: GET /mail/folders
    params:
      email:  { type: string, required: true,  description: 'Mailbox email address (required)' }
      format: { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  bulkUpdateMessages:
    description: >
      Apply one action to many messages at once — the fast path for inbox triage.
      action ∈ mark_read | mark_unread | archive | delete | add_label (add_label
      needs `label`). Up to 100 message ids per call.
    guidance:
      use: "triage in bulk — mark a page read, archive a batch, label many at once"
      next: "getInbox unread_only=true to see what remains"
      warn: "delete is destructive (no undo). add_label requires the `label` field. Max 100 ids per call."
      telemetry_signal_default: "warm"
    http: POST /mail/messages/bulk
    params:
      message_ids: { type: array,  items: integer, required: true,  description: 'Message ids to act on (1-100)' }
      action:      { type: string, required: true,  description: 'mark_read | mark_unread | archive | delete | add_label' }
      label:       { type: string, required: false, description: 'Label name (required when action=add_label)' }
    response: { format: json }

  snoozeMessage:
    description: Hide a message from the inbox until a timestamp, then auto-return it to its folder.
    guidance:
      use: "defer a message you can't deal with yet — it reappears at snoozed_until"
      next: "listSnoozed to see what's deferred; unsnoozeMessage to bring it back early"
      warn: "snoozed_until is an ISO-8601 timestamp in the future. The message leaves the inbox until then."
      telemetry_signal_default: "warm"
    http: POST /mail/messages/{message_id}/snooze
    params:
      message_id:   { type: string, required: true, description: 'Numeric message id' }
      snoozed_until: { type: string, required: true, description: 'ISO-8601 timestamp to unsnooze at' }
    response: { format: json }

  unsnoozeMessage:
    description: Cancel a snooze — return the message to the inbox now.
    guidance:
      use: "bring a snoozed message back early"
      telemetry_signal_default: "warm"
    http: DELETE /mail/messages/{message_id}/snooze
    params:
      message_id: { type: string, required: true, description: 'Numeric message id' }
    response: { format: json }

  listSnoozed:
    description: List messages currently snoozed (hidden from the inbox until their unsnooze time).
    guidance:
      use: "see what's deferred and when each returns"
      telemetry_signal_default: "warm"
    http: GET /mail/snoozed
    params:
      format: { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  listLabels:
    description: >
      List the tenant's LABEL DEFINITIONS (name + colour). These are the palette
      of labels; applying one to a message is updateMessage / bulkUpdateMessages.
    guidance:
      use: "see which labels exist before tagging messages"
      next: "createLabel to add one; updateMessage labels=[...] to apply"
      warn: "this manages label DEFINITIONS — to put a label ON a message use updateMessage or bulkUpdateMessages add_label."
      telemetry_signal_default: "warm"
    http: GET /mail/labels
    params:
      format: { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  createLabel:
    description: Define a new label with a name and a hex colour.
    guidance:
      use: "create a reusable label (e.g. 'hot-lead', '#EF4444')"
      warn: "color is a 6-digit hex like #6B7280 (default). name ≤50 chars."
      telemetry_signal_default: "cold"
    http: POST /mail/labels
    params:
      name:  { type: string, required: true,  description: 'Label name (≤50 chars)' }
      color: { type: string, required: false, description: 'Hex colour #RRGGBB (default #6B7280)' }
    response: { format: json }

  updateLabel:
    description: Rename or recolour a label definition.
    guidance:
      use: "edit a label's name or colour"
      telemetry_signal_default: "cold"
    http: PATCH /mail/labels/{label_id}
    params:
      label_id: { type: string, required: true,  description: 'Label id' }
      name:     { type: string, required: false, description: 'New name (≤50 chars)' }
      color:    { type: string, required: false, description: 'New hex colour #RRGGBB' }
    response: { format: json }

  deleteLabel:
    description: Delete a label definition.
    guidance:
      use: "remove a label from the palette"
      warn: "removes the definition; messages previously tagged keep the raw string until re-saved."
      telemetry_signal_default: "cold"
    http: DELETE /mail/labels/{label_id}
    params:
      label_id: { type: string, required: true, description: 'Label id' }
    response: { format: json }

  listViews:
    description: >
      List saved inbox views — named filter bundles ("Hot leads", "Starred only",
      one mailbox). A view's filter_config can be applied to getInbox via view_id.
    guidance:
      use: "see saved filter bundles you can apply with getInbox(view_id=...)"
      next: "createView to save one; getInbox view_id=<id> to apply"
      telemetry_signal_default: "warm"
    http: GET /mail/views
    params:
      format: { type: string, required: false, description: 'json (default) | yaml | md' }
    response: { format: json }

  createView:
    description: >
      Save a named inbox view from a filter_config (mailboxes, unread_only,
      starred_only, has_attachments). Set is_shared to expose it to the whole team.
    guidance:
      use: "save a reusable filter (e.g. unread starred across two mailboxes)"
      next: "getInbox view_id=<new id> to apply it"
      warn: "is_shared=true exposes the view to every dashboard user of the client; only the creator can edit it."
      telemetry_signal_default: "cold"
    http: POST /mail/views
    params:
      name:           { type: string,  required: true,  description: 'View name (≤200 chars)' }
      filter_config:
        type: object
        required: false
        description: '{ mailboxes[], unread_only, starred_only, has_attachments }'
        properties:
          mailboxes:       { type: array,   items: string, required: false, description: 'Email addresses to include; omit/null for all client mailboxes' }
          unread_only:     { type: boolean, required: false, description: 'Only unread messages (default false)' }
          starred_only:    { type: boolean, required: false, description: 'Only starred messages (default false)' }
          has_attachments: { type: boolean, required: false, description: 'Only messages with attachments (null = no filter)' }
      color:          { type: string,  required: false, description: 'Display colour' }
      sort_by:        { type: string,  required: false, description: 'Sort field (default date)' }
      sort_direction: { type: string,  required: false, description: 'ASC | DESC (default DESC)' }
      is_shared:      { type: boolean, required: false, description: 'Share with the whole client team (default false)' }
    response: { format: json }

  getView:
    description: Get one saved view by id (its filter_config + display config).
    guidance:
      use: "inspect a saved view's filters"
      telemetry_signal_default: "warm"
    http: GET /mail/views/{view_id}
    params:
      view_id: { type: string, required: true, description: 'Saved view id' }
    response: { format: json }

  updateView:
    description: Edit a saved view (creator-only).
    guidance:
      use: "change a saved view's name, filters, or sharing"
      warn: "only the creator can mutate a view, even a shared one."
      telemetry_signal_default: "cold"
    http: PATCH /mail/views/{view_id}
    params:
      view_id:        { type: string,  required: true,  description: 'Saved view id' }
      name:           { type: string,  required: false, description: 'New name' }
      filter_config:
        type: object
        required: false
        description: 'New filter config'
        properties:
          mailboxes:       { type: array,   items: string, required: false, description: 'Email addresses to include; omit/null for all client mailboxes' }
          unread_only:     { type: boolean, required: false, description: 'Only unread messages (default false)' }
          starred_only:    { type: boolean, required: false, description: 'Only starred messages (default false)' }
          has_attachments: { type: boolean, required: false, description: 'Only messages with attachments (null = no filter)' }
      color:          { type: string,  required: false, description: 'New colour' }
      sort_by:        { type: string,  required: false, description: 'Sort field' }
      sort_direction: { type: string,  required: false, description: 'ASC | DESC' }
      is_shared:      { type: boolean, required: false, description: 'Share with the team' }
    response: { format: json }

  deleteView:
    description: Delete a saved view (creator-only).
    guidance:
      use: "remove a saved view"
      telemetry_signal_default: "cold"
    http: DELETE /mail/views/{view_id}
    params:
      view_id: { type: string, required: true, description: 'Saved view id' }
    response: { format: json }

  # ── Outreach + warmup (Smartlead / lemlist / Instantly) ───────
  # Brand-scoped (/brands/{brand_id}/...). Reads are PAT-ok; writes (update/
  # delete/sync) require brand-admin. Connections are CREATED in the dashboard
  # IntegrationsTab — this skill reads/edits/syncs/revokes them. See
  # references/outreach-warmup.md.
  listOutreachConnections:
    description: >
      List the brand's outreach sidecars (one per Smartlead / lemlist / Instantly
      integration) — provider, workspace_id, warmup_tag, lemwarm_domains, active flag.
    guidance:
      use: "see which cold-email/warmup providers are connected to this brand"
      next: "listOutreachSenders for the sending accounts; getOutreachHealthOverview for deliverability"
      warn: "brand-scoped: brand_id is the numeric brand id, not a mailbox. Connections are created in the dashboard IntegrationsTab, not here."
      telemetry_signal_default: "warm"
    http: GET /brands/{brand_id}/mail/outreach/connections
    params:
      brand_id: { type: string, required: true, description: 'Numeric brand id' }
    response: { format: json }

  getOutreachConnection:
    description: Get one outreach connection by id (provider, workspace_id, warmup_tag, lemwarm_domains, active).
    guidance:
      use: "inspect one outreach/warmup sidecar's config"
      telemetry_signal_default: "warm"
    http: GET /brands/{brand_id}/mail/outreach/connections/{connection_id}
    params:
      brand_id:      { type: string, required: true, description: 'Numeric brand id' }
      connection_id: { type: string, required: true, description: 'Outreach connection id' }
    response: { format: json }

  updateOutreachConnection:
    description: >
      Edit an outreach connection — workspace_id, warmup_tag (the tag that marks
      warmup sends), lemwarm_domains, is_active, smartlead_client_id (agency
      sub-account scoping), or max_active_leads (the lead-push cap). BRAND-ADMIN only.
    guidance:
      use: "change warmup_tag/domains, pause (is_active=false), set the SmartLead agency client_id, or set max_active_leads (the per-account lead cap)"
      warn: "requires brand-admin (a plain PAT read-only token gets 403). Does NOT touch the underlying api_integrations credential. Set smartlead_client_id only for OUR shared/agency account; leave empty when the tenant uses their own SmartLead key."
      telemetry_signal_default: "cold"
    http: PATCH /brands/{brand_id}/mail/outreach/connections/{connection_id}
    params:
      brand_id:            { type: string,  required: true,  description: 'Numeric brand id' }
      connection_id:       { type: string,  required: true,  description: 'Outreach connection id' }
      workspace_id:        { type: string,  required: false, description: 'Provider workspace id (≤128 chars)' }
      warmup_tag:          { type: string,  required: false, description: 'Tag marking warmup sends' }
      lemwarm_domains:     { type: array,   items: string, required: false, description: 'lemlist warmup domains' }
      is_active:           { type: boolean, required: false, description: 'Enable / pause the sidecar' }
      smartlead_client_id: { type: string,  required: false, description: 'SmartLead agency/whitelabel client id; empty string clears it (own-account mode)' }
      max_active_leads:    { type: integer, required: false, description: 'Cap on distinct leads pushed via this connection (0+); omit/null = uncapped' }
    response: { format: json }

  deleteOutreachConnection:
    description: >
      Remove an outreach sidecar (and FK-cascade its senders + campaigns + health
      snapshots). Leaves the underlying api_integrations row intact. BRAND-ADMIN only.
    guidance:
      use: "disconnect an outreach provider sidecar"
      warn: "BRAND-ADMIN + destructive: cascades senders/campaigns/health. The user must remove the api_integrations entry separately. No undo."
      telemetry_signal_default: "cold"
    http: DELETE /brands/{brand_id}/mail/outreach/connections/{connection_id}
    params:
      brand_id:      { type: string, required: true, description: 'Numeric brand id' }
      connection_id: { type: string, required: true, description: 'Outreach connection id' }
    response: { format: json }

  syncOutreachConnection:
    description: >
      Pull the latest sender accounts from the provider into mail_outreach_senders
      and match them to local mailboxes. Returns counts (found / inserted / updated
      / mailbox_matches). BRAND-ADMIN only.
    guidance:
      use: "refresh the sending accounts + warmup state from Smartlead/lemlist/Instantly"
      next: "listOutreachSenders to see the synced accounts; getOutreachHealthOverview for their health"
      warn: "BRAND-ADMIN. This calls the provider API — it can take time; the route has a long (900s) proxy timeout."
      telemetry_signal_default: "cold"
    http: POST /brands/{brand_id}/mail/outreach/connections/{connection_id}/sync
    params:
      brand_id:      { type: string, required: true, description: 'Numeric brand id' }
      connection_id: { type: string, required: true, description: 'Outreach connection id' }
    response: { format: json }

  listOutreachSenders:
    description: >
      List every sending account across the brand's outreach connections —
      email_address, provider, warmup_enabled, status, and the matched local mailbox_id.
    guidance:
      use: "see all cold-email sending accounts + whether warmup is on for each"
      next: "getSenderHealth for one sender's deliverability snapshot"
      telemetry_signal_default: "warm"
    http: GET /brands/{brand_id}/mail/outreach/senders
    params:
      brand_id: { type: string, required: true, description: 'Numeric brand id' }
    response: { format: json }

  getSenderHealth:
    description: >
      One sender's latest deliverability/warmup snapshot — health_score, sent/inbox/
      spam/bounce/reply counts (24h + 7d), warmup_enabled, polled_at.
    guidance:
      use: "check a sending account's deliverability + warmup health"
      warn: "the snapshot is the LATEST poll, not live — see polled_at. May be null if never polled."
      telemetry_signal_default: "warm"
    http: GET /brands/{brand_id}/mail/outreach/senders/{sender_id}/health
    params:
      brand_id:  { type: string, required: true, description: 'Numeric brand id' }
      sender_id: { type: string, required: true, description: 'Outreach sender id' }
    response: { format: json }

  getOutreachHealthOverview:
    description: >
      Latest health snapshot per sender for the whole brand — one row per sending
      account. The deliverability/warmup grid for all outreach accounts at once.
    guidance:
      use: "one-shot deliverability/warmup overview across every sending account"
      next: "getSenderHealth for one sender's detail"
      telemetry_signal_default: "warm"
    http: GET /brands/{brand_id}/mail/outreach/health/overview
    params:
      brand_id: { type: string, required: true, description: 'Numeric brand id' }
    response: { format: json }

  # ── Slice D: push a campaign's verified leads → a chosen SmartLead campaign ──

  listOutreachCampaigns:
    description: >
      List the SmartLead campaigns this connection can see (scoped by its agency
      smartlead_client_id) — remote_campaign_id, name, status, lead_count. The
      picker you read BEFORE pushing leads.
    guidance:
      use: "find the target SmartLead campaign id to push leads into"
      next: "pushOutreachLeads with the chosen remote_campaign_id"
      warn: "only SmartLead implements this; lemlist/Instantly return 400. For OUR shared account the list is already client-scoped via the connection's smartlead_client_id."
      telemetry_signal_default: "warm"
    http: GET /brands/{brand_id}/mail/outreach/connections/{connection_id}/campaigns
    params:
      brand_id:      { type: string, required: true, description: 'Numeric brand id' }
      connection_id: { type: string, required: true, description: 'Outreach connection id' }
    response: { format: json }

  pushOutreachLeads:
    description: >
      Push a SpiderIQ campaign's verified leads into a chosen SmartLead campaign.
      Idempotent (already-pushed leads are skipped, never double-added). Returns
      added/skipped counts + the account's active-lead total. BRAND-ADMIN only.
    guidance:
      use: "send a finished campaign's verified leads into a SmartLead campaign for outreach"
      next: "getOutreachPushStatus to confirm counts; removeOutreachLeads to undo"
      warn: "BRAND-ADMIN. 409 account_lead_cap_reached if max_active_leads would be exceeded — pass `limit` to trim to the headroom instead of erroring, or removeOutreachLeads to free credits first. Only verified-email leads are pushed."
      telemetry_signal_default: "cold"
    http: POST /brands/{brand_id}/mail/outreach/connections/{connection_id}/push
    params:
      brand_id:                { type: string,  required: true,  description: 'Numeric brand id' }
      connection_id:           { type: string,  required: true,  description: 'Outreach connection id' }
      spideriq_campaign_id:    { type: string,  required: true,  description: 'Source SpiderIQ campaign id' }
      remote_campaign_id:      { type: string,  required: true,  description: 'Target SmartLead campaign id (from listOutreachCampaigns)' }
      smartlead_campaign_name: { type: string,  required: false, description: 'Target campaign name (for the confirmation notification)' }
      limit:                   { type: integer, required: false, description: 'Add at most N new leads; also trims to the account cap instead of erroring' }
    response: { format: json }

  removeOutreachLeads:
    description: >
      Remove tracked leads from a SmartLead campaign (frees account lead credits).
      Scope by spideriq_campaign_id and/or an explicit email list; with neither,
      removes ALL leads SpiderIQ pushed to that campaign. BRAND-ADMIN only.
    guidance:
      use: "pull leads back out of a SmartLead campaign / free account lead credits"
      next: "getOutreachPushStatus to confirm the freed headroom"
      warn: "BRAND-ADMIN. Only removes leads SpiderIQ itself pushed (tracked by lead id); leads added directly in SmartLead are untouched. No undo."
      telemetry_signal_default: "cold"
    http: POST /brands/{brand_id}/mail/outreach/connections/{connection_id}/remove
    params:
      brand_id:             { type: string, required: true,  description: 'Numeric brand id' }
      connection_id:        { type: string, required: true,  description: 'Outreach connection id' }
      remote_campaign_id:   { type: string, required: true,  description: 'Target SmartLead campaign id' }
      spideriq_campaign_id: { type: string, required: false, description: 'Only remove leads from this source campaign' }
      emails:               { type: array,  items: string, required: false, description: 'Only remove these specific lead emails' }
    response: { format: json }

  getOutreachPushStatus:
    description: >
      Quota usage (active_leads / max_active_leads / available) + per-campaign push
      counts (pushed / skipped / removed) for a connection.
    guidance:
      use: "see how many leads are in each SmartLead campaign and how much account headroom is left"
      next: "pushOutreachLeads (if headroom) or removeOutreachLeads (to free credits)"
      telemetry_signal_default: "warm"
    http: GET /brands/{brand_id}/mail/outreach/connections/{connection_id}/push-status
    params:
      brand_id:      { type: string, required: true, description: 'Numeric brand id' }
      connection_id: { type: string, required: true, description: 'Outreach connection id' }
    response: { format: json }
