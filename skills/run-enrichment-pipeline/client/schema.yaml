# Run Enrichment Pipeline Skill — API Surface Definition
# Source of truth for Tier 3 client generation.
# Regenerate plugin with: opvs-skills generate run-enrichment-pipeline

name: run-enrichment-pipeline
version: "1.1.0"
description: >
  Enrichment pipeline management — create and manage lead
  enrichment campaigns, retrieve results, control execution,
  and deduplicate records.
category: data-collection
base_url: /api/v1/spideriq
auth:
  type: pat
  header: Authorization
  prefix: Bearer
  env_var: OPVS_PAT
defaults:
  format: json
  timeout_ms: 60000
requires_brand: true
triggers:
  - enrichment
  - pipeline
  - campaign
  - windmill

guidance:
  use: "orchestrate multi-step enrichment campaigns — Maps search, website scrape, email verify in automated sequence"
  not:
    - "scrape-google-maps → single one-off Maps search"
    - "lead-enrichment → manual lead board management"
    - "campaigns → outreach campaigns (email sequences, not data enrichment)"
  chains:
    - "estimateCampaign (preflight) → createCampaign → getCampaignStatus (poll 10s) → getCampaignResults"
    - "getCampaignResults → deduplicate (remove duplicates before import)"
  limits:
    concurrent: "plan-tiered active campaigns — Free 1 / Starter 1 / Growth 3 / Pro unlimited"
    speed: "parallel locations per campaign — Free 1 (sequential) / Starter 5 / Growth 15 / Pro 50"
    batch: "start with 50-100 leads to validate pipeline"
  pitfalls:
    - "estimateCampaign BEFORE createCampaign — exact location + per-stage job counts, writes no rows, not billed"
    - "At the concurrent cap createCampaign returns 429 MAX_CAMPAIGNS_PER_CLIENT (envelope CTA → /dashboard/plans) — finish/stop a running campaign or upgrade; no queue, no Retry-After"
    - "Higher tiers run more locations in parallel (speed), not more results — Free is sequential"
    - "Start small (50-100 leads) to validate before scaling to thousands"
    - "Always deduplicate results before importing to board"
    - "Campaigns can run for hours — set expectations with user"
  case_study:
    location: "Berlin SaaS companies"
    steps: "Campaign(SaaS Berlin)→200 Maps results→Site(140)→89 emails→Verify→67 valid→Dedup→61 unique"
    time: "45min"
  case_date: "2026-03"

methods:
  # ── Estimate Campaign (pre-flight) ────────────────────────
  estimateCampaign:
    description: >
      Pre-flight estimate for a campaign — returns the exact
      location count and per-stage billable-job counts WITHOUT
      writing any rows. Pure read: not billed, not a dispatcher
      submission. Use it to make a Proceed/Upgrade decision
      before createCampaign.
    guidance:
      use: "size a campaign before submitting — exact counts, no rows written"
      next: "createCampaign (if requires_upgrade is false / volume acceptable)"
      warn: "cost is per-stage job COUNTS, not USD (no local per-job price). requires_upgrade=true → narrow the filter or upgrade the plan"
    http: POST /jobs/spiderMaps/campaigns/estimate
    params:
      country_code:
        type: string
        required: true
        description: ISO 2-letter country code (e.g. "US", "DE")
      filter:
        type: object
        required: false
        description: Location filter (mode all/regions/population/city/custom + admin_regions/include_postcodes/min_population/etc.) — the cost lever
        properties:
          mode:
            type: string
            required: false
            values: [all, population, cities_only, custom, regions, city]
            description: "Filter mode — all, population, cities_only, custom, regions, city (default all)"
          min_population:
            type: integer
            required: false
            description: Minimum population (required for population mode)
          max_population:
            type: integer
            required: false
            description: Maximum population (for population mode)
          location_ids:
            type: array
            items: integer
            required: false
            description: Specific location IDs (required for custom mode)
          admin_regions:
            type: array
            items: string
            required: false
            description: Admin regions / states (required for regions mode; scopes a postcode explosion to a state)
          parent_city:
            type: string
            required: false
            description: Parent city display_name (for city mode / narrowing a postcode explosion to one city)
          include_postcodes:
            type: boolean
            required: false
            description: Explode the scope into per-ZIP searches (default False; requires admin_regions or parent_city scope)
          exhaustive:
            type: boolean
            required: false
            description: Search every grid point including known-barren cells (default False)
      max_results:
        type: integer
        required: false
        description: Businesses per location (1-500, default 100) — multiplies the location count
      workflow:
        type: object
        required: false
        description: Which downstream stages to estimate (spidersite/spiderverify/vayapin enabled flags)
        properties:
          spidersite:
            type: object
            required: false
            description: Website-crawl stage config
            properties:
              enabled:
                type: boolean
                required: false
                description: Crawl each business's website for contacts and content
              mode:
                type: string
                required: false
                values: [contacts, compendium, leads, full]
                description: "SpiderSite preset: contacts (5p), compendium (5p), leads (25p), full (50p)"
          spiderverify:
            type: object
            required: false
            description: Email-verification stage config
            properties:
              enabled:
                type: boolean
                required: false
                description: SMTP-verify the extracted emails
          vayapin:
            type: object
            required: false
            description: VayaPin directory-profile stage config
            properties:
              enabled:
                type: boolean
                required: false
                description: Create a VayaPin profile for businesses with email (opt-in)
    response:
      format: json

  # ── Create Campaign ───────────────────────────────────────
  createCampaign:
    description: >
      Create a new enrichment campaign. Defines the search
      query, target country, and optional workflow configuration.
    guidance:
      next: "getCampaignStatus (poll every 10s). SMARTLEAD EXPORT: to auto-send the campaign's verified leads to a SmartLead outreach campaign at completion, set workflow.smartlead={enabled:true,connection_id,remote_campaign_id,only_with_vayapin_seo?} — discover the ids via the SpiderMail skill (listOutreachConnections → listOutreachCampaigns) FIRST; recipe in the @spideriq/spiderflows skill (smartlead-export)."
      warn: "start with max_results 50-100 for first run. At the plan's concurrent-campaign cap this returns 429 MAX_CAMPAIGNS_PER_CLIENT with an envelope CTA (suggested_url=/dashboard/plans) — finish/stop a running campaign or upgrade; no queue, no Retry-After. workflow.smartlead SENDS real email — only enable once the user confirms the target campaign."
    http: POST /campaigns
    params:
      search_query:
        type: string
        required: true
        description: Search query to find leads for enrichment
      country_code:
        type: string
        required: false
        description: ISO country code to filter results (e.g. "US", "GB")
      workflow:
        type: object
        required: false
        description: >
          Per-stage config: { spidersite:{enabled,mode}, spiderverify:{enabled},
          vayapin:{enabled}, smartlead:{enabled,connection_id,remote_campaign_id,only_with_vayapin_seo} }.
          smartlead auto-exports the campaign's VERIFIED leads into a SmartLead outreach
          campaign at terminal-close — discover connection_id + remote_campaign_id FIRST via
          the SpiderMail skill (listOutreachConnections / listOutreachCampaigns). Full recipe:
          @spideriq/spiderflows smartlead-export.
        properties:
          spidersite:
            type: object
            required: false
            description: Website-crawl stage config
            properties:
              enabled:
                type: boolean
                required: false
                description: Crawl each business's website for contacts and content
              mode:
                type: string
                required: false
                values: [contacts, compendium, leads, full]
                description: "SpiderSite preset: contacts (5p), compendium (5p), leads (25p), full (50p)"
          spiderverify:
            type: object
            required: false
            description: Email-verification stage config
            properties:
              enabled:
                type: boolean
                required: false
                description: SMTP-verify the emails extracted by SpiderSite
          vayapin:
            type: object
            required: false
            description: VayaPin directory-profile stage config
            properties:
              enabled:
                type: boolean
                required: false
                description: Create a VayaPin profile for businesses with email (opt-in, irreversible)
          social_media_enrichment:
            type: object
            required: false
            description: Social Media Enrichment fallback (only effective if your plan includes it)
            properties:
              enabled:
                type: boolean
                required: false
                description: Recover public social-media contact info for businesses with no verified email (default ON)
          smartlead:
            type: object
            required: false
            description: SmartLead finalize step — pushes verified leads into a SmartLead campaign at terminal-close
            properties:
              enabled:
                type: boolean
                required: false
                description: Push verified leads into a SmartLead campaign (opt-in, SENDS real email)
              connection_id:
                type: integer
                required: false
                description: mail_outreach_connections.id — the SmartLead account/sub-account to push into
              remote_campaign_id:
                type: string
                required: false
                description: SmartLead campaign id (required when enabled — chosen and locked at creation)
              remote_campaign_name:
                type: string
                required: false
                description: SmartLead campaign name snapshot (display + notification only)
              limit:
                type: integer
                required: false
                description: Push at most N new leads (also trims to the account cap instead of failing)
              only_with_vayapin_seo:
                type: boolean
                required: false
                description: Only push leads carrying a VayaPin SEO pin (requires vayapin.enabled)
    response:
      format: json
    errors:
      "429":
        code: MAX_CAMPAIGNS_PER_CLIENT
        meaning: >
          At the plan's concurrent-campaign cap. Envelope carries
          message + suggested_action + suggested_url=/dashboard/plans.
          Finish-or-upgrade — no queue, no Retry-After. Also fires a
          campaign.cannot_start notification.

  # ── List Campaigns ────────────────────────────────────────
  listCampaigns:
    description: >
      List all enrichment campaigns, optionally filtered by
      status with pagination.
    http: GET /campaigns
    params:
      status:
        type: string
        required: false
        description: Filter by campaign status (e.g. "running", "completed", "stopped")
      page:
        type: integer
        required: false
        description: Page number for pagination
      pageSize:
        type: integer
        required: false
        description: Number of campaigns per page
    response:
      format: json

  # ── Campaign Status ───────────────────────────────────────
  getCampaignStatus:
    description: >
      Get the current status and progress of a specific
      enrichment campaign.
    http: GET /campaigns/{campaign_id}
    params:
      campaign_id:
        type: string
        required: true
        description: The campaign ID to check status for
    response:
      format: json

  # ── Campaign Results ──────────────────────────────────────
  getCampaignResults:
    description: >
      Retrieve the enriched results from a completed or
      running campaign.
    http: GET /campaigns/{campaign_id}/results
    params:
      campaign_id:
        type: string
        required: true
        description: The campaign ID to get results for
    response:
      format: json

  # ── Stop Campaign ─────────────────────────────────────────
  stopCampaign:
    description: >
      Stop a running enrichment campaign. Already-processed
      results are preserved.
    guidance:
      warn: "stopped campaigns can be resumed with continueCampaign"
    http: POST /campaigns/{campaign_id}/stop
    params:
      campaign_id:
        type: string
        required: true
        description: The campaign ID to stop
    response:
      format: json

  # ── Continue Campaign ─────────────────────────────────────
  continueCampaign:
    description: >
      Resume a previously stopped enrichment campaign from
      where it left off.
    guidance:
      use: "resume a stopped/paused campaign"
      next: "getCampaignStatus (poll every 10s)"
    http: POST /campaigns/{campaign_id}/continue
    params:
      campaign_id:
        type: string
        required: true
        description: The campaign ID to continue
    response:
      format: json

  # ── Deduplicate ───────────────────────────────────────────
  deduplicate:
    description: >
      Fuzzy-match deduplicate a set of records based on
      specified fields. Returns unique records with
      similarity scores.
    guidance:
      use: "remove duplicate leads from campaign results before board import"
    http: POST /fuzziq/deduplicate
    params:
      records:
        type: array
        items: object
        required: true
        description: Array of record objects to deduplicate
      match_fields:
        type: array
        items: string
        required: true
        description: Field names to use for fuzzy matching
    response:
      format: json
