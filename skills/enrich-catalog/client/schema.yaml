# Enrich-Catalog Skill — API Surface + envelope (guidance:) block.
# Source of truth for Tier-3 client generation + the marketplace envelope.
# Spec: opvs-ai/vendors 04-publishing/4-layer-and-envelope.md.
#
# Wraps POST /api/v1/admin/gate/catalog/enrich (DF.2) — the admin mirror of the
# gate_catalog_enrich MCP tool (mcp-admin slice) and `spideriq gate catalog enrich`.
# Fetches FACTS (specs/pricing/benchmarks/perf/lineage) from the free stack and
# writes them provenance-stamped; it does NOT author editorial copy (author-catalog).
#
# AUTH (scoped-PAT, 2026-07): a curation agent authorises with its OWN PAT carrying
# `gate:catalog:enrich` (the narrow fetch-the-facts scope) OR `gate:catalog:write`
# (a full curator who authors copy can also enrich). A human admin grants the scope
# at PAT-approval time. The platform X-Admin-Key / a super_admin session still work.
# This makes read → enrich → author a single PAT can drive end-to-end.

name: enrich-catalog
version: "0.4.0"
description: >
  Go get the facts for the SpiderGate model catalog — `listModels` to enumerate the
  admin catalog (numeric ids + specs + is_curated) and pick targets, then `enrich` to
  run a scoped free-stack pass over a provider (or model_ids) and fill specs + pricing
  (OpenRouter), benchmarks + per-provider perf (LLM-Stats), and lineage (Wikidata),
  each provenance-stamped. Fetches FACTS, not editorial; authored (is_curated) copy is
  preserved; the fleet cron stays dark. Requires a PAT with `gate:catalog:enrich`
  or `gate:catalog:write` (or the platform X-Admin-Key / a super_admin session).
category: admin
base_url: /api/v1/admin/gate
# Agent path: a PAT granted `gate:catalog:enrich` OR `gate:catalog:write` (Bearer).
# Platform automation may instead send X-Admin-Key (SPIDERIQ_ADMIN_API_KEY).
auth:
  type: pat
  header: Authorization
  prefix: Bearer
  env_var: OPVS_PAT
  required_scope: gate:catalog:enrich
defaults:
  format: json
  timeout_ms: 120000
requires_brand: false
triggers:
  - fill the model catalog
  - enrich the gateway catalog
  - fetch facts for a provider
  - get benchmarks and pricing for a model
  - populate a model's specs

guidance:
  use: >
    Reach for this to FETCH a provider's (or specific models') factual fields —
    context window, pricing, benchmarks, per-provider performance, and developer/
    release/license lineage — from the free public sources, provenance-stamped.
    Enrich the facts FIRST, then author the copy with author-catalog. super_admin +
    X-Admin-Key.
  not:
    - "author-catalog → WRITE the human copy (description/badges/links) — this fetches facts (and lists rows to fill)"
    - "model-catalog (@spideriq/gateway-skills) → the CLIENT-facing catalog read (string ids, what clients see); listModels here is the ADMIN read (numeric ids + is_curated) for curation"
    - "manage-routing (gate_routing_*) → change WHICH model an alias routes to"
  # No free-text search field on this surface; scope is a typed provider name or an
  # id list. intent_aliases explicitly empty (Q1).
  intent_aliases: []
  pitfalls:
    - "Supply EXACTLY ONE of provider or model_ids — both, or neither, is a 422."
    - "Bounded to ~30 models/call (live web fetches). result.catalog_rows > result.matched ⇒ the rest were DEFERRED; narrow with model_ids or re-call. Never assume one call covered a huge provider."
    - "Fetches FACTS, not editorial: it does NOT write description/badges/tags. Author those in author-catalog AFTER enriching."
    - "is_curated authored copy is PRESERVED — only facts refresh; you can safely re-enrich a curated model."
    - "Never fabricate a missing fact: a source that returns nothing leaves a visible null; a delisted model's spec stays null (HARD-GATE). Benchmarks are self_reported vendor numbers — carry the flag."
    - "The fleet-wide 6h cron is NOT armed by this — it's on-demand + scoped."

methods:
  listModels:
    description: >
      Enumerate the admin catalog to pick enrichment targets — the FIRST step of a
      curation pass. Returns each row's numeric `id`, provider, model_id,
      spidergate_id, the flat spec (context_window / max_output / pricing / capabilities),
      `is_curated` + authored copy, reference `links`, and an evals rollup. Filter by
      `provider`, `curated` (false = only un-curated rows still needing work), `search`,
      or `tag`. Read-only, not metered. Accepts either catalog scope (`gate:catalog:enrich`
      or `gate:catalog:write`). Use this to find what to enrich, then call `enrich`.
    guidance:
      use: "List catalog rows (filter by provider / curated=false) to see what still needs enriching before you fetch facts."
      next: "enrich (fetch this provider's/model's facts), then verify-enrichment.sh, then author-catalog.setModelMeta"
      warn: "Read-only. The numeric `id` here is what enrich's model_ids and author-catalog's setModelMeta take (NOT the string id the client catalog returns). context_window=0 + no benchmarks ⇒ an un-enriched stub."
      telemetry_signal_default: "cold"
    http: GET /catalog/models
    params:
      ids:
        type: array
        required: false
        description: Fetch EXACTLY these numeric catalog ids (the by-id read). Use this to pull one model's row directly instead of scanning a whole provider. Bypasses the hidden filter.
        items:
          type: integer
      provider:
        type: string
        required: false
        description: Filter to one provider (exact match, e.g. deepseek).
      curated:
        type: boolean
        required: false
        description: true = only curated rows; false = only un-curated (the enrichment backlog); omit = all.
      model_id:
        type: string
        required: false
        description: Exact model_id lookup (pair with provider for a single-row fetch by name).
      is_configured:
        type: boolean
        required: false
        description: Filter by is_configured (models actually wired into routing).
      last_probe_status:
        type: string
        required: false
        description: Filter by exact last_probe_status (ok / delisted / no_tools / error).
      has_description:
        type: boolean
        required: false
        description: true = only rows WITH a non-empty description; false = only rows MISSING one.
      has_provider_perf:
        type: boolean
        required: false
        description: true = only rows that HAVE at least one provider_perf row; false = only rows missing it.
      has_links:
        type: boolean
        required: false
        description: true = only rows with at least one reference link; false = only rows missing links.
      view:
        type: string
        required: false
        description: "full (default) = the editor row; summary = a compact curation-state projection (id/provider/model_id/model_ref/is_curated + counts + needs_curation + reasons[]) — use for inventory/queue scans to avoid huge payloads."
      search:
        type: string
        required: false
        description: Substring match on model_id / display_name / spidergate_id.
      tag:
        type: string
        required: false
        description: Filter to models carrying this authored tag.
      limit:
        type: integer
        required: false
        description: Max rows (1–2000; default 1000 loads the catalog in one page).
      offset:
        type: integer
        required: false
        description: Pagination offset (default 0).
    response:
      format: json

  providerSummary:
    description: >
      Per-provider curation-completeness rollup — which providers are done? in ONE call:
      total / curated / uncurated / missing_description / missing_provider_perf /
      missing_links / hidden / configured, ordered most-uncurated first. Read-only.
    guidance:
      use: "Get a provider-level scoreboard of what still needs curation before diving into rows."
      next: "listModels(provider, view=summary, curated=false) to pull the exact rows that need work."
      warn: "Read-only, not metered. exclude_openrouter=true drops the 456-model passthrough."
      telemetry_signal_default: "cold"
    http: GET /catalog/providers/summary
    params:
      exclude_openrouter:
        type: boolean
        required: false
        description: Exclude the openrouter passthrough (third-party models we do not operate).
      include_hidden:
        type: boolean
        required: false
        description: Count hidden rows too (default true).
    response:
      format: json

  enrich:
    description: >
      Run a scoped free-stack enrichment pass and fill the scoped models' factual
      fields, provenance-stamped: specs + pricing (OpenRouter), benchmarks +
      per-provider perf (LLM-Stats), lineage (Wikidata). Supply EXACTLY ONE of
      `provider` or `model_ids`. Bounded to ~30 models/call. Authored (is_curated)
      copy is preserved. Never arms the fleet cron. Returns the aggregate result
      (rows/matched/benchmarks/perf/links/facts/spec/deferred).
    guidance:
      use: "Fetch + fill a provider's (or specific models') facts before authoring their copy."
      next: "verify-enrichment.sh (confirm the facts landed), then gate_catalog_model_set_meta (author the copy in author-catalog)"
      warn: "Exactly one of provider/model_ids. Bounded ~30/call (deferred = catalog_rows - matched). Facts only — author copy separately. Never fabricate a missing fact (HARD-GATE)."
      telemetry_signal_default: "cold"
    http: POST /catalog/enrich
    params:
      provider:
        type: string
        required: false
        description: Enrich every non-hidden model under this provider (e.g. openai). Exactly one of provider/model_ids.
      model_ids:
        type: array
        required: false
        description: Enrich these specific gate_model_catalog ids (≤30). Exactly one of provider/model_ids.
        items:
          type: integer
    response:
      format: json
