# spiderflows — SpiderIQ-native (foreign agents call /api/v1 directly)
# ONE skill for all SpiderIQ flows. Methods today implement the
# flow:maps-site-verify-vayapin chain; more flows add methods + recipes here.
# Adapted from the canonical SpiderIQ-repo schema:
#   base_url /api/v1 -> /api/v1/spideriq ; env_var SPIDERIQ_PAT -> OPVS_PAT
#   native /jobs/spiderMaps/campaigns/* paths (verified against app/api/v1/campaigns.py).
#   campaigns skills (/lead-search, /campaigns/*) rather than the SpiderIQ-native
#   /jobs/spiderMaps/campaigns/* paths. Consolidates lead-search + campaigns.
# NOTE: the NEW delete/retry/results sub-paths follow the /campaigns/{id}/*
# convention; verify the OPVS proxy forwards them before relying on them live.

name: spiderflows
version: "0.1.0"
description: >
  Run SpiderIQ flows — server-side scrape/enrich pipelines. The lead and
  local-business chain (Maps → Site → Verify → optional VayaPin), sold as both
  leadSearch and localSeo (one pipeline, differing only by the vayapin stage);
  single location or multi-location campaign, full lifecycle, results via IDAP.
  And the company-intel chain (Perplexity → Site → Registry → LinkedIn → Verify):
  one company name in, a full account brief out (domain, registry filing,
  LinkedIn team, verified emails); single or batch (≤50). Replaces the separate
  lead-search + campaigns skills.
category: data-collection
base_url: /api/v1
auth:
  type: pat
  header: Authorization
  prefix: Bearer
  env_var: SPIDERIQ_PAT
defaults:
  format: yaml
  timeout_ms: 60000
requires_brand: true
triggers:
  - find local businesses
  - scrape leads
  - build a verified lead list
  - lead search
  - local seo
  - google maps scrape with contact details
  - research a company
  - company intel
  - account brief
  - enrich a company list
  - kyc enrichment

guidance:
  use: >
    Discover businesses + verified contact emails for a place (single) or across
    many locations (campaign) via Maps -> Site -> Verify -> (optional) VayaPin;
    OR research a company by NAME into a full account brief (domain, registry
    filing, LinkedIn team, verified emails) via Perplexity -> Site -> Registry ->
    LinkedIn -> Verify (researchCompany single / researchCompaniesBatch ≤50).
  not:
    - "scrape-google-maps -> Maps listings only, no site crawl or email verify"
    - "verify-email-deliverability -> verify a list of emails you already have"
    - "find-people-extract-linkedin-profile -> one named PERSON (company-intel is company-first)"
  intent_aliases: ["search_query", "query", "company_name"]
  pitfalls:
    - "Campaign filter.mode 'all'/'cities_only' over a country fans to thousands of locations — size it first."
    - "vayapin publishes PERMANENT public pins; deleting the campaign does not remove them. Set vayapin.enabled explicitly."
    - "Single mode: location goes in search_query OR location, never both. Campaign mode: keep search_query bare."
    - "company-intel: pass domain/linkedin_url hints when known (they skip a discovery step). Registry resolves UK/US/EU only; empty registry/LinkedIn is a normal partial brief. Batch caps at 50 companies."

methods:
  searchLeads:
    description: >
      Run the full pipeline for ONE search in ONE location (Maps -> Site ->
      Verify -> optional VayaPin). Returns a job_id to poll.
    guidance:
      use: "one city / one search — fastest path, always safe on cost"
      next: "getJobStatus, then getJobResults"
      warn: "omitting workflow makes vayapin publish (default ON on this path) — set vayapin.enabled=false for a data-only lead list"
      telemetry_signal_default: "cold"
    http: POST /lead-search
    params:
      search_query: { type: string, required: true, description: 'What to search for (e.g. "plumbers in Berlin"). 1-255 chars.' }
      country_code: { type: string, required: false, description: 'ISO 2-letter code (default US)' }
      location:     { type: string, required: false, description: 'Place; appended as "{query} in {location}". Do not also put it in search_query.' }
      max_results:  { type: integer, required: false, description: 'Businesses from Maps, 1-500 (default 20)' }
      lang:         { type: string, required: false, description: 'Maps language (default en)' }
      workflow:     { type: object, required: false, description: 'Per-stage config: { spidersite:{enabled,mode}, spiderverify:{enabled}, vayapin:{enabled} }' }
      test:         { type: boolean, required: false, description: 'Route to test queue' }
    response: { format: json }

  createCampaign:
    description: >
      Run the same search across many locations. One pipeline per location.
      Returns campaign_id + total_locations.
    guidance:
      use: "multi-location coverage — check total_locations in the response"
      next: "getCampaignStatus (poll >=5s), retryFailedLocations, getCampaignResults"
      warn: "filter.mode defaults to 'all' (every location). Narrow with regions/population/custom or stop immediately."
      telemetry_signal_default: "cold"
    http: POST /jobs/spiderMaps/campaigns/submit
    params:
      search_query: { type: string, required: true, description: 'BARE term (e.g. "plumbers") — location comes from country_code + filter' }
      country_code: { type: string, required: true, description: 'ISO 2-letter code' }
      filter:       { type: object, required: false, description: 'Location selection: { mode: all|population|cities_only|custom|regions, min_population?, admin_regions?, location_ids? }. Default mode=all.' }
      max_results:  { type: integer, required: false, description: 'Businesses PER LOCATION, 1-500 (default 100)' }
      name:         { type: string, required: false, description: 'Campaign label (auto if omitted)' }
      workflow:     { type: object, required: false, description: 'Per-stage config; vayapin follows what you send here' }
      test:         { type: boolean, required: false, description: 'Route to test queue' }
    response: { format: json }

  listCampaigns:
    description: List campaigns with optional filters.
    guidance: { use: "see existing campaigns before creating a duplicate", telemetry_signal_default: "warm" }
    http: GET /jobs/spiderMaps/campaigns
    params:
      status:       { type: string, required: false, description: 'active | completed | stopped' }
      country_code: { type: string, required: false, description: 'ISO 2-letter filter' }
    response: { format: json }

  getCampaignStatus:
    description: Campaign progress, stats, and workflow info.
    guidance: { use: "poll campaign progress", warn: "poll no faster than every 5s", telemetry_signal_default: "hot" }
    http: GET /jobs/spiderMaps/campaigns/{campaign_id}/status
    params:
      campaign_id: { type: string, required: true, description: 'Campaign ID returned by createCampaign' }
    response: { format: json }

  getJobStatus:
    description: Status of a single lead-search job.
    guidance: { use: "poll a single run", warn: "poll >=3-5s", telemetry_signal_default: "hot" }
    http: GET /jobs/{job_id}/status
    params:
      job_id: { type: string, required: true, description: 'Job ID returned by searchLeads' }
    response: { format: json }

  stopCampaign:
    description: Halt dispatch of further locations (resumable).
    guidance: { use: "stop a runaway campaign at once; in-flight jobs finish", next: "continueCampaign or deleteCampaign", telemetry_signal_default: "cold" }
    http: POST /jobs/spiderMaps/campaigns/{campaign_id}/stop
    params:
      campaign_id: { type: string, required: true, description: 'Campaign ID returned by createCampaign' }
    response: { format: json }

  continueCampaign:
    description: Resume a stopped campaign from where it left off.
    guidance: { use: "resume after a stop", next: "getCampaignStatus", telemetry_signal_default: "cold" }
    http: POST /jobs/spiderMaps/campaigns/{campaign_id}/continue
    params:
      campaign_id: { type: string, required: true, description: 'Campaign ID returned by createCampaign' }
    response: { format: json }

  updateCampaign:
    description: Update a campaign's config (name, query, max_results, workflow) before/while running.
    guidance: { use: "tweak a campaign's config", telemetry_signal_default: "cold" }
    http: PATCH /jobs/spiderMaps/campaigns/{campaign_id}
    params:
      campaign_id:  { type: string, required: true, description: 'Campaign ID returned by createCampaign' }
      name:         { type: string, required: false, description: 'New campaign label' }
      search_query: { type: string, required: false, description: 'New bare search term' }
      max_results:  { type: integer, required: false, description: 'New per-location cap, 1-500' }
      workflow:     { type: object, required: false, description: 'New per-stage config' }
    response: { format: json }

  retryLocation:
    description: Re-run a single failed/completed location.
    guidance:
      use: "recover one location"
      warn: "pick the narrowest retry_mode: verify (SMTP only) < site (keep Maps) < full (from scratch)"
      telemetry_signal_default: "cold"
    http: POST /jobs/spiderMaps/campaigns/{campaign_id}/locations/{location_id}/retry
    params:
      campaign_id: { type: string, required: true, description: 'Campaign ID returned by createCampaign' }
      location_id: { type: integer, required: true, description: 'Location ID within the campaign (from getCampaignResults / listCampaigns)' }
      retry_mode:  { type: string, required: false, description: 'full (default) | site | verify' }
    response: { format: json }

  retryFailedLocations:
    description: Re-run every failed location, up to max_locations.
    guidance:
      use: "bulk-recover a campaign's failures"
      warn: "locations already at the 3-retry limit are SKIPPED (skipped_count), not errored"
      telemetry_signal_default: "cold"
    http: POST /jobs/spiderMaps/campaigns/{campaign_id}/retry-failed
    params:
      campaign_id:   { type: string, required: true, description: 'Campaign ID returned by createCampaign' }
      max_locations: { type: integer, required: false, description: 'cap on how many failed locations to retry' }
    response: { format: json }

  deleteCampaign:
    description: Delete a campaign and its run/location rows.
    guidance:
      use: "remove a campaign you no longer need"
      warn: "returns 409 while jobs are active — stop first. Does NOT unpublish VayaPin pins (those persist on cs.vayapin.com)."
      telemetry_signal_default: "cold"
    http: DELETE /jobs/spiderMaps/campaigns/{campaign_id}
    params:
      campaign_id: { type: string, required: true, description: 'Campaign ID returned by createCampaign' }
    response: { format: json }

  getJobResults:
    description: Aggregated output of a completed single run.
    guidance: { use: "read a single run's results", telemetry_signal_default: "warm" }
    http: GET /jobs/{job_id}/results
    params:
      job_id: { type: string, required: true, description: 'Job ID returned by searchLeads' }
    response: { format: json }

  getCampaignResults:
    description: One-shot aggregate of a campaign (Maps + Site + Verify per business).
    guidance: { use: "dump a whole campaign once", next: "readResources for paged/filtered reads", telemetry_signal_default: "warm" }
    http: GET /jobs/spiderMaps/campaigns/{campaign_id}/workflow-results
    params:
      campaign_id: { type: string, required: true, description: 'Campaign ID returned by createCampaign' }
    response: { format: json }

  readResources:
    description: >
      Query a campaign's normalized records via IDAP — paged, projectable,
      flaggable. resource_type is businesses|contacts|emails|phones|domains
      (pins read via include=pins on businesses, not as a type).
    guidance:
      use: "the read surface for campaign data — page, project fields, filter by flag"
      warn: "GET /idap/pins 422s — read pins via ?include=pins on businesses (pins[].vayapin_url)"
      telemetry_signal_default: "warm"
    http: GET /idap/{resource_type}
    params:
      resource_type: { type: string, required: true, description: 'businesses | contacts | emails | phones | domains | company_registry | linkedin_profiles | staff | bookings | media' }
      campaign_id:   { type: string, required: false, description: 'scope to one run' }
      include:       { type: string, required: false, description: 'comma-separated relations, e.g. emails,phones,domains,pins (businesses)' }
      fields:        { type: string, required: false, description: 'comma-separated projection' }
      limit:         { type: integer, required: false, description: '1-500 (default 100)' }
      cursor:        { type: string, required: false, description: 'next-page token' }
      format:        { type: string, required: false, description: 'json | yaml | md' }
    response: { format: json }

  # ── flow:perplexity-site-companydata-people (Company Intel) ──────────────
  # One company name -> account brief. Perplexity discovery -> Site -> Registry
  # -> LinkedIn people -> Verify. Single + batch only (no campaign fan-out).
  # Read the brief via getJobResults; registry + LinkedIn are standalone IDAP
  # types (readResources resource_type=company_registry | linkedin_profiles).
  researchCompany:
    description: >
      Research ONE company by name through the full intelligence chain
      (Perplexity discovery -> Site crawl -> registry filing -> LinkedIn team ->
      email verify). Returns a job_id to poll; getJobResults yields the brief.
    guidance:
      use: "one company -> a full account brief (domain, registry, LinkedIn, verified emails)"
      next: "getJobStatus, then getJobResults"
      warn: "pass domain/linkedin_url hints when known — they skip a discovery step (cheaper, more accurate). Registry resolves UK/US/EU only; empty registry/LinkedIn is a normal partial brief, not a failure."
      telemetry_signal_default: "cold"
    http: POST /company-intel
    params:
      company_name:  { type: string, required: true, description: 'Company to research (1-255 chars), e.g. "Acme Corp"' }
      city:          { type: string, required: false, description: 'City hint — sharpens Perplexity discovery + constrains registry' }
      country_code:  { type: string, required: false, description: 'ISO 2-letter; constrains registry. GB auto-enables UK financials (~$0.05).' }
      domain:        { type: string, required: false, description: 'Known domain — SKIPS Perplexity domain discovery' }
      linkedin_url:  { type: string, required: false, description: 'Known LinkedIn company URL — SKIPS LinkedIn discovery' }
      profile_mode:  { type: string, required: false, description: 'Employee detail: short (default) | full | full_email — higher = slower/pricier' }
      max_employees: { type: integer, required: false, description: 'Employees from LinkedIn, 1-2000 (default 20)' }
      config:        { type: object, required: false, description: 'Per-stage toggles: { discovery, spidersite{mode,max_pages,extract_*}, spidercompanydata{country,include_financials}, spiderverify{max_emails}, spiderpeople{max_employees,profile_mode} } — each has enabled' }
      test:          { type: boolean, required: false, description: 'Route to test queues' }
    response: { format: json }

  researchCompaniesBatch:
    description: >
      Research a LIST of companies (up to 50) through the same chain — KYC /
      list enrichment. One job_id covers the whole batch; getJobResults returns
      one brief per company.
    guidance:
      use: "enrich many companies at once (≤50) — KYC, vendor lists, ABM target lists"
      next: "getJobStatus (poll >=3-5s), then getJobResults"
      warn: "hard cap 50/batch (422 over). Put each company's domain/linkedin_url hint on ITS entry; top-level profile_mode/max_employees/config are shared. Default profile_mode=short for large lists — full/full_email scale cost steeply."
      telemetry_signal_default: "cold"
    http: POST /company-intel/batch
    params:
      companies:     { type: array,   required: true,  description: '1-50 entries; each a company object {company_name, city?, country_code?, domain?, linkedin_url?, config?}' }
      profile_mode:  { type: string,  required: false, description: 'Shared employee detail for all: short | full | full_email' }
      max_employees: { type: integer, required: false, description: 'Shared per-company employee cap, 1-2000' }
      config:        { type: object,  required: false, description: 'Shared per-stage config (per-company config overrides)' }
      test:          { type: boolean, required: false, description: 'Route to test queues' }
    response: { format: json }
