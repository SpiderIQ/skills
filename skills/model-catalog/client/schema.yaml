# Model-Catalog Skill — API Surface + envelope (guidance:) block.
# Source of truth for Tier-3 client generation + the marketplace envelope.
# Spec: opvs-ai/vendors 04-publishing/4-layer-and-envelope.md (intent_aliases Q1,
# per-method use/next/warn/telemetry_signal_default Q4).
#
# base_url is the OpenAI-compatible gateway core (/api/gate/v1); the catalog
# READ endpoints live under /api/gate/v1/catalog/* (GateBoard D.1). Every method
# below resolves to a real endpoint — no phantom paths. Reads are LIST-ONLY:
# not metered, not billable (same class as listModels).

name: model-catalog
version: "0.1.0"
description: >
  Read the enriched SpiderGate model catalog, the public model×task leaderboard,
  and the per-model #7 evals aggregate — to PICK a concrete model for a task
  under a budget. Facts + benchmarks + live per-provider pricing + eval scores,
  every sourced field carrying provenance.
category: ai-gateway
base_url: /api/gate/v1
auth:
  type: pat
  header: Authorization
  prefix: Bearer
  env_var: SPIDERIQ_PAT
defaults:
  format: json
  timeout_ms: 60000
requires_brand: false
triggers:
  - which model is best for
  - best model for coding under
  - cheapest model for a task
  - compare model benchmarks
  - model leaderboard
  - read model evals
  - pick a concrete model
  - enriched model catalog

guidance:
  use: >
    Reach for this to CHOOSE a model: rank models for a task on the leaderboard,
    pull the enriched catalog (spec + benchmarks + live per-provider pricing +
    eval scores) to compare, then pin the winner. The leaderboard answers "best
    model for <task_type> under $X"; the evals aggregate is the shared prior a
    planner blends against its own experience.
  not:
    - "use-the-gateway → SEND a completion once you've picked a model (this skill only READS the catalog)"
    - "spidergate-manager → administer the key POOL / providers — not model selection"
    - "manage-routing (admin-skills) → EDIT alias→model chains (super_admin) — reading the catalog is client-tier"
  # intent_aliases maps free-text picks onto method params. listCatalog.search and
  # leaderboard.task_type are the only free-text fields; declare them explicitly
  # (the runtime never guesses — Q1).
  intent_aliases:
    - "\"models that can do vision / function-calling\" → listCatalog(fields=capabilities)"
    - "\"best coding model\" → leaderboard(task_type=coding)"
  pitfalls:
    - "Reads are NOT metered/billable (list-only) — the leaderboard is fully PUBLIC (no PAT needed); catalog/get/evals resolve your brand from the PAT."
    - "To answer a budget question, rank with leaderboard(task_type=…) THEN filter rows by the blended price — the endpoint ranks by eval score, it does not filter by price for you."
    - "model_id is the catalog id — a spidergate_id OR a raw provider/model (e.g. openai/gpt-4o-mini); the slash is part of the id, pass it whole."
    - "Eval fields can be null until an OPVS eval contribution lands for that model×task — treat a null score as 'no prior yet', not 'zero'."
    - "The catalog is large + stable — pull once with fields= to narrow, then cache; don't re-list every turn."
    - "Once you've picked a model, pin it by passing its model_id as `model` to use-the-gateway's chat (D7 direct-model) — you don't have to route through a task alias."

methods:
  listCatalog:
    description: >
      List the enriched model catalog: identity + spec + authored editorial
      (description/tags/badges) plus — by default — benchmarks, a per-provider
      price/latency snapshot, reference links, and the evals aggregate, every
      sourced row carrying provenance. Pass `fields` (CSV) to narrow the payload
      to just the sections you need for concrete-model selection.
    guidance:
      use: "Pull the enriched catalog to compare models on spec, price, and eval score."
      next: "getModel (full record for one), leaderboard (rank for a task), chat via use-the-gateway (pin the winner)"
      warn: "Large + stable — narrow with fields= and cache; don't re-list every turn."
      telemetry_signal_default: "cold"
    http: GET /catalog/models
    params:
      provider:
        type: string
        required: false
        description: Filter by provider (e.g. "openai", "anthropic").
      search:
        type: string
        required: false
        description: Search model id / display name.
      tag:
        type: string
        required: false
        description: Filter by authored tag.
      fields:
        type: string
        required: false
        description: 'CSV projection — recognised: capabilities, context, max_output, pricing, tier, descriptions, tags, aliases, per_provider, benchmarks, links, evals. e.g. "capabilities,pricing,per_provider,evals". Unknown tokens ignored.'
      configured_only:
        type: boolean
        required: false
        description: Only routable (configured) models.
      free_only:
        type: boolean
        required: false
        description: Only free-tier models.
      include_hidden:
        type: boolean
        required: false
        description: Include models hidden from the public catalog.
      limit:
        type: integer
        required: false
        description: Max results 1–1000 (default 200).
      offset:
        type: integer
        required: false
        description: Pagination offset.
    response:
      format: json

  getModel:
    description: >
      Full enriched record for one model by its catalog id (a spidergate_id or a
      raw provider/model): spec + authored copy + benchmarks + per-provider
      pricing + links + evals aggregate, with provenance. 404 if the id is
      unknown.
    guidance:
      use: "Inspect one model in full before pinning it."
      next: "chat via use-the-gateway (pass model_id as `model`), modelEvals (the task-scoped prior)"
      warn: "model_id includes the slash for provider/model ids — pass it whole (openai/gpt-4o-mini)."
      telemetry_signal_default: "cold"
    http: GET /catalog/models/{model_id}
    params:
      model_id:
        type: string
        required: true
        description: Catalog id — a spidergate_id or a raw provider/model (e.g. "claude-3-5-sonnet" or "openai/gpt-4o-mini").
    response:
      format: json

  leaderboard:
    description: >
      PUBLIC model×task-type leaderboard (no PAT required). Curated models ranked
      by the auto-eval success rate for the requested task_type (the shared
      prior), each row carrying the headline benchmark and the cheapest live
      blended price across providers. Omit task_type for the global ranking.
    guidance:
      use: "Rank models for a task; the basis for 'best model for <task_type> under $X'."
      next: "filter the returned rows by blended price for a budget, then getModel / pin via chat"
      warn: "Ranks by eval score, NOT price — apply the budget filter yourself on the returned rows."
      telemetry_signal_default: "cold"
    http: GET /catalog/leaderboard
    params:
      task_type:
        type: string
        required: false
        description: Rank for this task type (e.g. "coding", "planning"); omit for the global ranking.
      limit:
        type: integer
        required: false
        description: Max models to return 1–500 (default 100).
    response:
      format: json

  modelEvals:
    description: >
      The #7 evals aggregate for one model — the machine-eval (auto) rollups plus
      human star ratings, keyed on the served model. This is the shared PRIOR a
      planner blends against its own posterior. Pass task_type to scope to one
      task; omit for all task types plus the global row.
    guidance:
      use: "Read the eval prior for a model (per task) before trusting it for that task."
      next: "leaderboard (compare across models), chat via use-the-gateway (pin it)"
      warn: "A null score means 'no eval contribution yet', not zero — don't rank a model last for missing data."
      telemetry_signal_default: "cold"
    http: GET /catalog/models/{model_id}/evals
    params:
      model_id:
        type: string
        required: true
        description: Catalog id — a spidergate_id or a raw provider/model.
      task_type:
        type: string
        required: false
        description: Scope to this task type; omit for all task types + the global row.
    response:
      format: json
