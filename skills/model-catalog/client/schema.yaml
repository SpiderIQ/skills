# Model-Catalog Skill — API Surface + envelope (guidance:) block.
# Source of truth for Tier-3 client generation + the marketplace envelope.
# Spec: opvs-ai/vendors 04-publishing/4-layer-and-envelope.md (intent_aliases Q1,
# per-method use/next/warn/telemetry_signal_default Q4).
#
# base_url is the OPVS marketplace PROXY path (/api/v1/spideriq/gate) — OPVS rewrites
# it to SpiderGate /api/gate/v1/; the catalog READ methods are /catalog/* (GateBoard D.1).
# NEVER the service-native /api/gate/v1 here (that 404s the OPVS route). Reads are LIST-ONLY:
# not metered, not billable (same class as listModels).

name: model-catalog
version: "0.2.0"
description: >
  Read the enriched SpiderGate model catalog, the public model×task leaderboard,
  the model-capability CATEGORY taxonomy (Coding, Design/Frontend, Reasoning,
  Math, Vision, Research, Tool-use, Chat, Translation) with per-category quality
  scores, and the per-model #7 evals aggregate — to PICK a concrete model for a
  task under a budget. Facts + benchmarks + live per-provider pricing + eval
  scores + per-category percentile scores, every sourced field carrying provenance.
category: ai-gateway
base_url: /api/v1/spideriq/gate
upstream:
  base_url: https://spideriq.ai/api/gate/v1  # SpiderGate LLM base (Option C direct)
auth:
  type: pat
  header: Authorization
  prefix: Bearer
  env_var: SPIDERIQ_PAT
defaults:
  format: json
  timeout_ms: 60000
requires_brand: false
triggers:
  - which model is best for
  - best model for coding under
  - cheapest model for a task
  - compare model benchmarks
  - model leaderboard
  - read model evals
  - pick a concrete model
  - enriched model catalog
  - best model for coding / vision / reasoning
  - model capability categories
  - per-category quality score
  - rank models by category score

guidance:
  use: >
    Reach for this to CHOOSE a model: rank models for a task on the leaderboard,
    pull the enriched catalog (spec + benchmarks + live per-provider pricing +
    eval scores) to compare, then pin the winner. The leaderboard answers "best
    model for <task_type> under $X"; the evals aggregate is the shared prior a
    planner blends against its own experience.
  not:
    - "use-the-gateway → SEND a completion once you've picked a model (this skill only READS the catalog)"
    - "spidergate-manager → administer the key POOL / providers — not model selection"
    - "manage-routing (admin-skills) → EDIT alias→model chains (super_admin) — reading the catalog is client-tier"
  # intent_aliases maps free-text picks onto method params. listCatalog.search and
  # leaderboard.task_type are the only free-text fields; declare them explicitly
  # (the runtime never guesses — Q1).
  intent_aliases:
    - "\"models that can do vision / function-calling\" → listCatalog(fields=capabilities)"
    - "\"best coding model\" → leaderboard(task_type=coding)"
    - "\"best model for coding / vision / reasoning\" (capability, not eval task) → leaderboard(category=coding, sort=score)"
    - "\"which categories are there\" → listCategories()"
  pitfalls:
    - "Reads are NOT metered/billable (list-only) — the leaderboard is fully PUBLIC (no PAT needed); catalog/get/evals resolve your brand from the PAT."
    - "To answer a budget question, rank with leaderboard(task_type=…) THEN filter rows by the blended price — the endpoint ranks by eval score, it does not filter by price for you."
    - "model_id is the catalog id — a spidergate_id OR a raw provider/model (e.g. openai/gpt-4o-mini); the slash is part of the id, pass it whole."
    - "Eval fields can be null until an OPVS eval contribution lands for that model×task — treat a null score as 'no prior yet', not 'zero'."
    - "The catalog is large + stable — pull once with fields= to narrow, then cache; don't re-list every turn."
    - "Once you've picked a model, pin it by passing its model_id as `model` to use-the-gateway's chat (D7 direct-model) — you don't have to route through a task alias."
    - "TWO ranking axes, don't confuse them: leaderboard(task_type=…) ranks by the #7 EVAL success rate (needs an eval contribution); leaderboard(category=…, sort=score) ranks by the benchmark-derived per-category PERCENTILE (needs published benchmarks). Use `category` for capability questions ('best coding/vision model'), `task_type` for eval-prior questions."
    - "A category `score` IS a within-category PERCENTILE (0–100), NOT a raw benchmark mean — higher = better relative to peers scored in that category. Read `rank` ÷ the response `total` for 'rank/N'; each score's `components[]` is the WHY (the contributing benchmarks, self_reported flagged)."
    - "Only ~19% of catalog models (≈219 of 1126) carry any category score — a model with an empty `category_scores[]` is unscored (no published benchmarks yet), NOT bad. Render 'no score' gracefully; don't rank it last."
    - "`category_scores[]` is a child section on the catalog record — request it explicitly with fields=category_scores on listCatalog/getModel (like benchmarks/evals); it's omitted from the default projection."

methods:
  listCatalog:
    description: >
      List the enriched model catalog: identity + spec + authored editorial
      (description/tags/badges) plus — by default — benchmarks, a per-provider
      price/latency snapshot, reference links, and the evals aggregate, every
      sourced row carrying provenance. Pass `fields` (CSV) to narrow the payload
      to just the sections you need for concrete-model selection.
    guidance:
      use: "Pull the enriched catalog to compare models on spec, price, and eval score."
      next: "getModel (full record for one), leaderboard (rank for a task), chat via use-the-gateway (pin the winner)"
      warn: "Large + stable — narrow with fields= and cache; don't re-list every turn."
      telemetry_signal_default: "cold"
    http: GET /catalog/models
    params:
      provider:
        type: string
        required: false
        description: Filter by provider (e.g. "openai", "anthropic").
      search:
        type: string
        required: false
        description: Search model id / display name.
      tag:
        type: string
        required: false
        description: Filter by authored tag.
      fields:
        type: string
        required: false
        description: 'CSV projection — recognised: capabilities, context, max_output, pricing, tier, descriptions, tags, aliases, per_provider, benchmarks, links, evals, category_scores. e.g. "capabilities,pricing,category_scores". `category_scores` adds each model''s per-category percentile section ([{category_key,label,emoji,score,rank,n_signals,confidence,components,computed_at}], best-first; [] for the ~900 unscored models). Unknown tokens ignored.'
      configured_only:
        type: boolean
        required: false
        description: Only routable (configured) models.
      free_only:
        type: boolean
        required: false
        description: Only free-tier models.
      include_hidden:
        type: boolean
        required: false
        description: Include models hidden from the public catalog.
      limit:
        type: integer
        required: false
        description: Max results 1–1000 (default 200).
      offset:
        type: integer
        required: false
        description: Pagination offset.
    response:
      format: json

  getModel:
    description: >
      Full enriched record for one model by its catalog id (a spidergate_id or a
      raw provider/model): spec + authored copy + benchmarks + per-provider
      pricing + links + evals aggregate, with provenance. 404 if the id is
      unknown.
    guidance:
      use: "Inspect one model in full before pinning it."
      next: "chat via use-the-gateway (pass model_id as `model`), modelEvals (the task-scoped prior)"
      warn: "model_id includes the slash for provider/model ids — pass it whole (openai/gpt-4o-mini)."
      telemetry_signal_default: "cold"
    http: GET /catalog/models/{model_id}
    params:
      model_id:
        type: string
        required: true
        description: Catalog id — a spidergate_id or a raw provider/model (e.g. "claude-3-5-sonnet" or "openai/gpt-4o-mini").
    response:
      format: json

  leaderboard:
    description: >
      PUBLIC model leaderboard (no PAT required) with TWO modes. Default (or with
      task_type): models ranked by the auto-eval success rate for the requested
      task_type (the #7 shared prior), each row carrying the headline benchmark
      and the cheapest live blended price. PER-CATEGORY mode (pass category +
      sort=score): models ranked by their benchmark-derived within-category
      PERCENTILE for that capability category, each carrying score + rank + the
      response `total` (rank/N) + the contributing `components`. `category` takes
      precedence over `task_type`. Omit both for the global eval ranking.
    guidance:
      use: "Rank models for a task ('best model for <task_type> under $X') OR for a capability category (category=coding, sort=score)."
      next: "filter the returned rows by blended price for a budget, then getModel / pin via chat"
      warn: "Two axes: task_type ranks by EVAL success rate, category ranks by benchmark PERCENTILE. Neither ranks by price — apply the budget filter yourself. Use listCategories() to see valid category keys."
      telemetry_signal_default: "cold"
    http: GET /catalog/leaderboard
    params:
      task_type:
        type: string
        required: false
        description: Rank by the eval prior for this task type (e.g. "coding", "planning"); omit for the global ranking. Ignored when `category` is set.
      category:
        type: string
        required: false
        description: Rank by within-category percentile for this capability category key (e.g. "coding", "vision"). Requires sort=score. Takes precedence over task_type. Get valid keys from listCategories.
      sort:
        type: string
        required: false
        description: Ranking basis (default "score"). Pass "score" together with `category` to get the per-category percentile leaderboard.
      limit:
        type: integer
        required: false
        description: Max models to return 1–500 (default 100).
    response:
      format: json

  listCategories:
    description: >
      List the model-capability CATEGORY taxonomy (the 9 DB-backed categories:
      Coding, Design/Frontend, Reasoning, Math, Vision, Research, Tool-use, Chat,
      Translation) — each with its label, emoji, description, and a live
      scored_model_count (the N behind "rank/N"). Read this to discover the valid
      `category` keys for the per-category leaderboard and to know how many models
      are scored in each. Inactive categories are hidden. Read-only, not metered.
    guidance:
      use: "Discover the capability categories + how many models are scored in each, before ranking with leaderboard(category=…, sort=score)."
      next: "leaderboard(category=<key>, sort=score) to rank; listCatalog(fields=category_scores) to read a model's own per-category scores"
      warn: "Client read HIDES inactive categories and omits the scoring recipe (that's the admin curate-categories surface). scored_model_count is the N for rank/N."
      telemetry_signal_default: "cold"
    http: GET /catalog/categories
    params:
      include_inactive:
        type: boolean
        required: false
        description: Include categories with is_active=false (default false — the client read hides them).
    response:
      format: json

  modelEvals:
    description: >
      The #7 evals aggregate for one model — the machine-eval (auto) rollups plus
      human star ratings, keyed on the served model. This is the shared PRIOR a
      planner blends against its own posterior. Pass task_type to scope to one
      task; omit for all task types plus the global row.
    guidance:
      use: "Read the eval prior for a model (per task) before trusting it for that task."
      next: "leaderboard (compare across models), chat via use-the-gateway (pin it)"
      warn: "A null score means 'no eval contribution yet', not zero — don't rank a model last for missing data."
      telemetry_signal_default: "cold"
    http: GET /catalog/models/{model_id}/evals
    params:
      model_id:
        type: string
        required: true
        description: Catalog id — a spidergate_id or a raw provider/model.
      task_type:
        type: string
        required: false
        description: Scope to this task type; omit for all task types + the global row.
    response:
      format: json
