# Auth Skill — API Surface Definition
# Source of truth for Tier 3 client generation.
# Regenerate plugin with: opvs-skills generate auth

name: auth
version: "1.1.0"
description: >
  Multi-brand authentication and session management — user profile,
  brand memberships, OAuth connectors, and profile photo upload.
category: auth
base_url: /api/v1/auth
auth:
  type: pat
  header: Authorization
  prefix: Bearer
  env_var: OPVS_PAT
defaults:
  format: json
  timeout_ms: 15000
requires_brand: false
triggers:
  - auth
  - login
  - session
  - brand
  - switch

# On-demand envelope (§4.6). The gateway proxy decorates every response with
# `_guidance` + `telemetry_signal` from this block.
guidance:
  use: >
    Bootstrap and manage an agent's identity: request a PAT (approval-email flow),
    rotate/recover the SAME account, and read/update the user profile + brand
    memberships. You are a per-workspace ACCOUNT — a self-identifying PAT
    (spideriq_pat_<agent_ref>_<secret>) plus a public OPVS address (<name>@opvs.run).
  not:
    - "@spideriq/workspace-skills → manage the brand's team, invites, settings (not your own token)"
    - "The dashboard Team → Agents page (/dashboard/team) → view/rotate/revoke/message agent accounts (no PAT tool yet)"
  intent_aliases: ["owner_email", "email", "admin_email", "opvs_address", "recover_as"]
  pitfalls:
    - "Re-auth from a new folder does NOT fork a new identity — a held PAT ROTATES the same account."
    - "On a fresh box with no held PAT, pass recover_as/--as <opvs-address> or you SIGN UP a stranger."
    - "Legacy spideriq_pat_<32-hex> tokens still authenticate — don't force a re-issue."

methods:
  # -- PAT Bootstrap (no auth required) -------------------------------------
  requestAccess:
    description: >
      Request a PAT for API access — the bootstrap entry point (no auth
      required). Sends an approval email to the workspace admin; returns a
      request_id + poll_token to poll. On approval you get a SELF-IDENTIFYING
      PAT `spideriq_pat_<agent_ref>_<secret>` plus a public OPVS address
      (`<name>@opvs.run`). This is idempotent per account: if you already hold a
      PAT it ROTATES the SAME account (held PAT wins); pass recover_as to
      RECOVER an existing account by its OPVS address on a fresh machine;
      otherwise it SIGNS UP a new account. It never forks a per-folder ghost.
    http: POST /pat/request
    params:
      workspace_slug:
        type: string
        required: true
        description: Workspace slug (brand identifier, e.g. "spideriq")
      owner_email:
        type: string
        required: true
        description: Email of the workspace admin who will approve the request
      recover_as:
        type: string
        required: false
        description: >
          Your existing OPVS address (`<name>@opvs.run`) to RECOVER that account
          on a fresh machine with no held PAT. Ignored if a PAT is already held
          (held PAT wins → rotate). Mirrors the CLI `--as` flag.
      project_name:
        type: string
        required: false
        description: Name of the project requesting access
      requested_scopes:
        type: array
        items: string
        required: false
        description: Scopes to request (default board:read, board:write)
      ttl_hours:
        type: integer
        required: false
        default: 72
        description: Token lifetime in hours (1-8760, default 72)
    guidance:
      use: "First-time enrollment, OR re-enrolling/rotating/recovering the same agent account."
      next: "checkAccessStatus (poll the request_id until approved → token auto-stored)"
      warn: "A held PAT always wins (rotate). To recover on a new box you MUST pass recover_as/--as, else you sign up a stranger."
      telemetry_signal_default: "cold"
    response:
      format: json

  requestAccessByEmail:
    description: >
      Simplified PAT request — email only, auto-discovers all brands
      the admin belongs to. No authentication required.
    http: POST /pat/request-by-email
    params:
      owner_email:
        type: string
        required: true
        description: Email of the admin who will approve
      project_name:
        type: string
        required: false
        description: Name of the project requesting access
      requested_scopes:
        type: array
        items: string
        required: false
        description: Scopes to request
      ttl_hours:
        type: integer
        required: false
        default: 72
        description: Token lifetime in hours
    response:
      format: json

  checkAccessStatus:
    description: >
      Poll for PAT request approval status. When approved, auto-stores the
      self-identifying token in OPVS_PAT (and the account's opvsAddress
      alongside it) so all subsequent tool calls are authenticated and the
      account is addressable. Returns status: pending, approved, denied, or
      expired.
    http: GET /pat/request/{request_id}/status
    auth_override:
      type: bearer
      from_param: poll_token
    store_token:
      env_var: OPVS_PAT
      json_path: workspaces.0.token
    params:
      request_id:
        type: string
        required: true
        description: Request ID from requestAccess response
      poll_token:
        type: string
        required: true
        description: Poll token from requestAccess response
    guidance:
      use: "Poll after requestAccess until status=approved; the PAT + opvsAddress land in credentials.json automatically."
      warn: "Same subject on every approval email → Gmail threads them; the mail is delivered, check the thread."
      telemetry_signal_default: "hot"

  # -- Current User ----------------------------------------------------------
  getMe:
    description: >
      Get the current user's profile including all brand memberships.
      Returns user details (name, email, photo, role) and a list of
      brands the user belongs to with their role and position.
    http: GET /me
    response:
      format: json

  # -- Signup Complete -------------------------------------------------------
  completeSignup:
    description: >
      Complete signup by creating a user profile, brand, and membership.
      Called after Better Auth signup succeeds. Creates the user record,
      a new brand, brand_settings, brand_information, and brand_membership.
    http: POST /signup/complete
    params:
      brand_name:
        type: string
        required: true
        description: Name for the new brand/organization
      firstname:
        type: string
        required: false
        description: User's first name
      lastname:
        type: string
        required: false
        description: User's last name
    response:
      format: json

  # -- Signup with Invite ----------------------------------------------------
  signupWithInvite:
    description: >
      Complete signup using an invitation token. Creates the user profile
      and adds them to the inviting brand as a client member.
    http: POST /signup/with-invite
    params:
      invite_token:
        type: string
        required: true
        description: The invitation token from the invite link
    response:
      format: json

  # -- Accept Invite (existing user) ----------------------------------------
  acceptInvite:
    description: >
      Accept a brand invitation as an already-authenticated user.
      Adds the user to the inviting brand without re-authentication.
    http: POST /accept-invite
    params:
      invite_token:
        type: string
        required: true
        description: The invitation token to accept
    response:
      format: json

  # -- Update Profile --------------------------------------------------------
  updateProfile:
    description: >
      Update the current user's profile. Supports partial updates for
      first name, last name, and mobile number. Automatically recomputes
      full_name from first + last.
    http: PATCH /profile
    params:
      firstname:
        type: string
        required: false
        description: Updated first name
      lastname:
        type: string
        required: false
        description: Updated last name
      mobile:
        type: string
        required: false
        description: Updated mobile/phone number
    response:
      format: json

  # -- Upload Profile Photo --------------------------------------------------
  uploadProfilePhoto:
    description: >
      Upload a profile picture. Resizes to 256x256 JPEG and stores in
      Cloudflare R2. Accepts PNG, JPG, or GIF up to 5MB.
    http: POST /profile/photo
    params:
      file:
        type: string
        required: true
        description: Image file path or base64 data (PNG, JPG, or GIF, max 5MB)
    response:
      format: json

  # -- Remove Profile Photo --------------------------------------------------
  removeProfilePhoto:
    description: >
      Remove the current user's profile picture. Cleans up the R2 file
      if stored there.
    http: DELETE /profile/photo
    response:
      format: json

  # -- OAuth Connectors ------------------------------------------------------
  getConnectors:
    description: >
      List connected OAuth providers for the current user. Returns
      provider name, connection date, and associated email for each
      linked social login (GitHub, Google, etc.). Excludes credential
      (email/password) entries.
    http: GET /connectors
    response:
      format: json
